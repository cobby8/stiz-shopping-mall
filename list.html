<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIZ - Team Wear & Sportswear</title>
    <!-- SEO 메타 태그: 검색엔진과 소셜 미디어 최적화 -->
    <meta name="description" content="축구, 농구, 배구 등 팀 유니폼부터 스포츠웨어까지. STIZ에서 나만의 팀 정체성을 만드세요.">
    <meta property="og:title" content="STIZ - Team Wear & Sportswear">
    <meta property="og:description" content="축구, 농구, 배구 등 팀 유니폼부터 스포츠웨어까지. STIZ에서 나만의 팀 정체성을 만드세요.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/hero_bg.jpg">
    <link rel="canonical" href="https://stiz.co.kr/list.html">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <!-- Material Symbols (아이콘 폰트) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="font-sans antialiased text-gray-900 bg-white">

    <!-- HEADER -->
    <header></header>
    <div class="h-20"></div> <!-- Spacer -->
    <div class="h-20"></div> <!-- Spacer -->

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-12 flex flex-col">

        <!-- Horizontal Filter Bar: js/list.js의 renderCategoryTabs()가 DB 카테고리로 동적 생성 -->
        <div class="w-full mb-8 overflow-x-auto whitespace-nowrap pb-2 scrollbar-hide">
            <div class="flex space-x-2">
                <!-- 로딩 중 자리표시자 -->
                <button class="px-4 py-2 rounded-full text-xs font-bold bg-black text-white border border-black">All Products</button>
            </div>
        </div>

        <!-- Product Grid -->
        <section class="flex-1">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold uppercase" id="page-title">All Products</h2>
                <!-- 정렬 select — 이벤트 바인딩은 js/list.js의 bindEvents()에서 수행 -->
                <select id="sort-select"
                    class="border border-gray-300 rounded px-3 py-1 text-sm bg-white focus:outline-none focus:border-black">
                    <option value="newest">Sort by: Newest</option>
                    <option value="price_asc">Price: Low to High</option>
                    <option value="price_desc">Price: High to Low</option>
                    <option value="name">Name: A to Z</option>
                </select>
            </div>

            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Products will be injected here via JS -->
            </div>
        </section>
    </main>

    <!-- Floating Design Services (FAB) -->
    <div id="floating-fab" class="fixed bottom-8 right-6 flex flex-col space-y-3 z-50">
        <a href="custom_mockup.html"
            class="bg-black text-white w-48 py-3 text-center text-sm font-bold shadow-2xl hover:bg-gray-800 transition-all flex items-center justify-center space-x-2 rounded-full border-2 border-white ring-1 ring-black/10">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
            </svg>
            <span>무료 시안 요청하기</span>
        </a>
    </div>

    <!-- FOOTER -->
    <footer class="bg-black text-white" data-include="layout/footer.html"></footer>

    <!-- Scripts -->
    <!-- product-data.js 제거됨 — 이제 /api/products 로 상품을 불러온다 -->
    <script src="js/header_render.js" defer></script>
    <script src="js/chatbot.js" defer></script>
    <script src="js/fomo-toast.js" defer></script>
    <script src="js/main.js" defer></script>
    <!-- js/list.js: 상품 목록 + 카테고리 탭 + 정렬을 API 기반으로 처리 -->
    <script src="js/list.js?v=20260410" defer></script>
</body>

</html>
