<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP - STIZ</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <!-- Material Symbols (아이콘 폰트) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="font-sans antialiased text-gray-900 bg-white">

    <!-- HEADER -->
    <header></header>
    <div class="h-20"></div> <!-- Spacer -->
    <div class="h-20"></div> <!-- Spacer -->

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-12 flex flex-col">

        <!-- Horizontal Filter Bar (Replaces Sidebar) -->
        <div class="w-full mb-8 overflow-x-auto whitespace-nowrap pb-2 scrollbar-hide">
            <div class="flex space-x-2">
                <button onclick="filterProducts('all')" id="cat-all"
                    class="px-4 py-2 rounded-full text-xs font-bold bg-black text-white transition-colors border border-black">All
                    Products</button>
                <button onclick="filterProducts('basketball')" id="cat-basketball"
                    class="px-4 py-2 rounded-full text-xs font-bold bg-white text-gray-500 hover:text-black border border-gray-200 hover:border-black transition-colors">Basketball</button>
                <button onclick="filterProducts('soccer')" id="cat-soccer"
                    class="px-4 py-2 rounded-full text-xs font-bold bg-white text-gray-500 hover:text-black border border-gray-200 hover:border-black transition-colors">Soccer</button>
                <button onclick="filterProducts('sportswear')" id="cat-sportswear"
                    class="px-4 py-2 rounded-full text-xs font-bold bg-white text-gray-500 hover:text-black border border-gray-200 hover:border-black transition-colors">Sportswear</button>
                <button onclick="filterProducts('kogas')" id="cat-kogas"
                    class="px-4 py-2 rounded-full text-xs font-bold bg-white text-gray-500 hover:text-black border border-gray-200 hover:border-black transition-colors">KOGAS
                    MD</button>
                <button onclick="filterProducts('accessories')" id="cat-accessories"
                    class="px-4 py-2 rounded-full text-xs font-bold bg-white text-gray-500 hover:text-black border border-gray-200 hover:border-black transition-colors">Accessories</button>
            </div>
        </div>

        <!-- Product Grid -->
        <section class="flex-1">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold uppercase" id="page-title">All Products</h2>
                <select id="sort-select" onchange="sortProducts(this.value)"
                    class="border border-gray-300 rounded px-3 py-1 text-sm bg-white focus:outline-none focus:border-black">
                    <option value="newest">Sort by: Newest</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="name">Name: A to Z</option>
                </select>
            </div>

            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Products will be injected here via JS -->
            </div>
        </section>
    </main>

    <!-- Floating Design Services (FAB) -->
    <div id="floating-fab" class="fixed bottom-8 right-6 flex flex-col space-y-3 z-50">
        <a href="custom_mockup.html"
            class="bg-black text-white w-48 py-3 text-center text-sm font-bold shadow-2xl hover:bg-gray-800 transition-all flex items-center justify-center space-x-2 rounded-full border-2 border-white ring-1 ring-black/10">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
            </svg>
            <span>무료 시안 요청하기</span>
        </a>
        <button onclick="openQuoteModal()"
            class="bg-white text-black w-48 py-3 text-center text-sm font-bold shadow-2xl hover:bg-gray-50 transition-all flex items-center justify-center space-x-2 rounded-full border border-gray-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
            </svg>
            <span>자동 견적 알아보기</span>
        </button>
    </div>

    <!-- Quote Modal & Functions (Load if needed) -->
    <!-- Ideally we should componentize this, but for list.html floating FAB we need the modal present if it's not already -->
    <script>
        function openQuoteModal() {
            alert('⚡ 자동 견적 시스템\n\n상품 상세 페이지에서 이용 가능합니다.\n원하시는 상품을 선택해주세요!');
        }
    </script>

    <!-- FOOTER -->
    <footer class="bg-black text-white" data-include="layout/footer.html"></footer>

    <!-- Scripts -->
    <script src="js/product-data.js"></script>
    <script src="js/header_render.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="js/fomo-toast.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Use URL Params to determine mode (custom vs store)
        const urlParams = new URLSearchParams(window.location.search);
        const currentType = urlParams.get('type') || 'all'; // 'custom', 'store', or 'all'
        let currentCategory = urlParams.get('category') || 'all';

        document.addEventListener('DOMContentLoaded', () => {
            setupPageMode();
            filterProducts(currentCategory);
        });

        function setupPageMode() {
            const pageTitle = document.getElementById('page-title');
            const filterContainer = document.querySelector('.overflow-x-auto .flex');

            if (currentType === 'custom') {
                pageTitle.innerText = "CUSTOMIZING TEAMWEAR";
                // Update Filters for Custom
                filterContainer.innerHTML = `
                    <button onclick="filterProducts('all')" id="cat-all" class="px-4 py-2 rounded-full text-xs font-bold bg-black text-white transition-colors border border-black">All Custom</button>
                    <button onclick="filterProducts('soccer')" id="cat-soccer" class="px-4 py-2 rounded-full text-xs font-bold bg-white text-gray-500 hover:text-black border border-gray-200 hover:border-black transition-colors">Soccer</button>
                    <button onclick="filterProducts('basketball')" id="cat-basketball" class="px-4 py-2 rounded-full text-xs font-bold bg-white text-gray-500 hover:text-black border border-gray-200 hover:border-black transition-colors">Basketball</button>
                    <button onclick="filterProducts('volleyball')" id="cat-volleyball" class="px-4 py-2 rounded-full text-xs font-bold bg-white text-gray-500 hover:text-black border border-gray-200 hover:border-black transition-colors">Volleyball</button>
                    <button onclick="filterProducts('teamwear')" id="cat-teamwear" class="px-4 py-2 rounded-full text-xs font-bold bg-white text-gray-500 hover:text-black border border-gray-200 hover:border-black transition-colors">Warm-up/Training</button>
                `;
            } else if (currentType === 'store') {
                pageTitle.innerText = "STIZ ONLINE STORE";
                // Update Filters for Store
                filterContainer.innerHTML = `
                    <button onclick="filterProducts('all')" id="cat-all" class="px-4 py-2 rounded-full text-xs font-bold bg-black text-white transition-colors border border-black">All Items</button>
                    <button onclick="filterProducts('sportswear')" id="cat-sportswear" class="px-4 py-2 rounded-full text-xs font-bold bg-white text-gray-500 hover:text-black border border-gray-200 hover:border-black transition-colors">Apparel</button>
                    <button onclick="filterProducts('accessories')" id="cat-accessories" class="px-4 py-2 rounded-full text-xs font-bold bg-white text-gray-500 hover:text-black border border-gray-200 hover:border-black transition-colors">Equipment</button>
                    <button onclick="filterProducts('kogas')" id="cat-kogas" class="px-4 py-2 rounded-full text-xs font-bold bg-white text-blue-600 hover:text-blue-800 border border-gray-200 hover:border-blue-600 transition-colors">KOGAS MD</button>
                `;
            }
        }

        function renderProducts(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';

            if (items.length === 0) {
                grid.innerHTML = '<div class="col-span-4 text-center py-20 text-gray-400">No products found in this category.</div>';
                return;
            }

            items.forEach(p => {
                const isCustom = p.type === 'custom';
                const el = document.createElement('div');
                el.className = 'group relative';
                el.innerHTML = `
                    <div class="aspect-[3/4] w-full bg-gray-100 overflow-hidden relative cursor-pointer" onclick="location.href='detail.html?id=${p.id}&type=${p.type}'">
                        <img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                        
                        <!-- Actions Overlay -->
                        <div class="absolute inset-x-0 bottom-0 bg-white/90 backdrop-blur-sm p-4 translate-y-full group-hover:translate-y-0 transition-transform duration-300">
                            <button onclick="event.stopPropagation(); location.href='detail.html?id=${p.id}'" 
                                class="w-full ${isCustom ? 'bg-blue-600' : 'bg-black'} text-white text-xs font-bold py-3 uppercase tracking-wider hover:opacity-90">
                                ${isCustom ? 'Get Estimate' : 'Add to Cart'}
                            </button>
                        </div>
                        
                         <!-- Type Badge -->
                        <div class="absolute top-2 left-2">
                             <span class="text-[10px] font-bold px-2 py-1 rounded-sm ${isCustom ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-800'}">
                                ${isCustom ? 'CUSTOM' : 'STORE'}
                            </span>
                        </div>
                    </div>
                    <div class="pt-3">
                        <p class="text-[10px] text-gray-500 uppercase tracking-wider mb-1">${p.category}</p>
                        <h3 class="text-xs font-bold text-gray-900 truncate cursor-pointer hover:underline" onclick="location.href='detail.html?id=${p.id}'">${p.name}</h3>
                        <p class="text-xs font-medium mt-1">₩${p.price.toLocaleString()}</p>
                    </div>
                `;
                grid.appendChild(el);
            });
        }

        function sortItems(items) {
            const sortBy = document.getElementById('sort-select')?.value || 'newest';
            switch (sortBy) {
                case 'price-asc':
                    return items.sort((a, b) => a.price - b.price);
                case 'price-desc':
                    return items.sort((a, b) => b.price - a.price);
                case 'name':
                    return items.sort((a, b) => a.name.localeCompare(b.name));
                case 'newest':
                default:
                    return items.sort((a, b) => b.id - a.id);
            }
        }

        function sortProducts() {
            filterProducts(currentCategory);
        }

        function filterProducts(cat) {
            currentCategory = cat;

            // Core Filter Logic: Category + Type
            let items = getProductsByCategory(cat, currentType === 'all' ? null : currentType);
            items = sortItems([...items]);

            renderProducts(items);

            // Update UI State
            const buttons = document.querySelectorAll('.overflow-x-auto button');
            buttons.forEach(btn => {
                btn.classList.remove('bg-black', 'text-white', 'border-black');
                btn.classList.add('bg-white', 'text-gray-500', 'border-gray-200');
            });
            const activeBtn = document.getElementById(`cat-${cat}`);
            if (activeBtn) {
                activeBtn.classList.remove('bg-white', 'text-gray-500', 'border-gray-200');
                activeBtn.classList.add('bg-black', 'text-white', 'border-black');
            }
        }

        // Quick Cart/Quote Placeholder
        function addToCartQuick(id) {
            // ... logic ...
        }
    </script>
</body>

</html>
