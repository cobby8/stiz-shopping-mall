<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry - STIZ</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="font-sans antialiased text-gray-900 bg-white">

    <header></header>
    <div class="h-20"></div>
    <div class="h-20"></div>

    <main class="container mx-auto px-6 py-12 max-w-5xl">

        <h1 class="text-4xl font-bold mb-4 tracking-tighter">INQUIRY</h1>
        <p class="text-gray-500 mb-12">Q&A Board</p>

        <!-- Search & Filter -->
        <div class="flex justify-between items-center mb-6 border-b-2 border-black pb-4">
            <div class="text-sm text-gray-500">
                Total <span class="font-bold text-black" id="post-count">3</span> posts
            </div>
            <div class="relative">
                <input type="text" placeholder="Search..."
                    class="border border-gray-300 pl-4 pr-10 py-2 text-sm rounded-none focus:border-black outline-none transition-colors">
                <button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-black">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Board List -->
        <div class="w-full text-sm">
            <!-- Header: 모바일에서 No./Date 숨기고 Subject 확장 -->
            <div class="grid grid-cols-12 gap-4 py-3 border-b border-black font-bold text-center">
                <div class="col-span-1 hidden md:block">No.</div>
                <div class="col-span-10 md:col-span-8 text-left pl-4">Subject</div>
                <div class="col-span-2 md:col-span-2">Author</div>
                <div class="col-span-1 hidden md:block">Date</div>
            </div>

            <!-- Items -->
            <div id="notice-list">
                <!-- Row 1: 모바일에서 No./Date 숨김 -->
                <div class="grid grid-cols-12 gap-4 py-4 border-b border-gray-100 items-center text-center hover:bg-gray-50 transition-colors cursor-pointer"
                    onclick="toggleSecret()">
                    <div class="col-span-1 hidden md:block text-gray-500">3</div>
                    <div class="col-span-10 md:col-span-8 text-left pl-4 flex items-center">
                        <span class="mr-2 text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4"
                                fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg></span>
                        <span class="font-medium text-gray-900">배송 언제 되나요?</span>
                    </div>
                    <div class="col-span-2 md:col-span-2 text-gray-500">James</div>
                    <div class="col-span-1 hidden md:block text-gray-400">2025-12-09</div>
                </div>

                <!-- Row 2 -->
                <div class="grid grid-cols-12 gap-4 py-4 border-b border-gray-100 items-center text-center hover:bg-gray-50 transition-colors cursor-pointer"
                    onclick="toggleSecret()">
                    <div class="col-span-1 hidden md:block text-gray-500">2</div>
                    <div class="col-span-10 md:col-span-8 text-left pl-4 flex items-center">
                        <span class="mr-2 text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4"
                                fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg></span>
                        <span class="font-medium text-gray-900">사이즈 문의드립니다.</span>
                        <span class="ml-2 bg-black text-white text-[10px] px-1 py-0.5 rounded">Answered</span>
                    </div>
                    <div class="col-span-2 md:col-span-2 text-gray-500">Sarah</div>
                    <div class="col-span-1 hidden md:block text-gray-400">2025-12-08</div>
                </div>

                <!-- Row 3 -->
                <div class="grid grid-cols-12 gap-4 py-4 border-b border-gray-100 items-center text-center hover:bg-gray-50 transition-colors cursor-pointer"
                    onclick="toggleSecret()">
                    <div class="col-span-1 hidden md:block text-gray-500">1</div>
                    <div class="col-span-10 md:col-span-8 text-left pl-4 flex items-center">
                        <span class="mr-2 text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4"
                                fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg></span>
                        <span class="font-medium text-gray-900">단체 주문 견적 요청</span>
                    </div>
                    <div class="col-span-2 md:col-span-2 text-gray-500">TeamAce</div>
                    <div class="col-span-1 hidden md:block text-gray-400">2025-12-07</div>
                </div>
            </div>
        </div>

        <div class="flex justify-end mt-8">
            <button
                class="bg-black text-white px-6 py-3 font-bold text-sm tracking-wide hover:bg-gray-800 transition-colors">
                WRITE INQUIRY
            </button>
        </div>

        <!-- Pagination -->
        <div class="flex justify-center mt-12 space-x-2">
            <button
                class="w-8 h-8 flex items-center justify-center border border-gray-200 text-gray-400 hover:text-black hover:border-black transition-colors">&lt;</button>
            <button class="w-8 h-8 flex items-center justify-center bg-black text-white font-bold">1</button>
            <button
                class="w-8 h-8 flex items-center justify-center border border-gray-200 text-gray-500 hover:text-black hover:border-black transition-colors">2</button>
            <button
                class="w-8 h-8 flex items-center justify-center border border-gray-200 text-gray-400 hover:text-black hover:border-black transition-colors">&gt;</button>
        </div>

    </main>

    <footer class="bg-black text-white" data-include="layout/footer.html"></footer>

    <script src="js/main.js"></script>
    <script src="js/header_render.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function toggleSecret() {
            alert('This is a secret post. Only the author can view it.');
        }
    </script>
</body>

</html>
