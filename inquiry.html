<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="icon" type="image/png" href="images/favicon-32.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIZ - 문의하기</title>
    <!-- SEO 메타 태그 -->
    <meta name="description" content="STIZ 1:1 문의. 단체 주문, 견적 문의, 제작 상담.">
    <meta property="og:title" content="STIZ - 1:1 문의">
    <meta property="og:description" content="STIZ 1:1 문의. 단체 주문, 견적 문의, 제작 상담.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/hero_bg.jpg">
    <link rel="canonical" href="https://stiz.co.kr/inquiry.html">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="css/style.css">
    <!-- Material Symbols (아이콘) -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body class="font-sans antialiased text-gray-900 bg-white">

    <header></header>
    <div class="h-20"></div>

    <main class="container mx-auto px-6 py-12 max-w-5xl">

        <h1 class="text-4xl font-bold mb-4 tracking-tighter">1:1 문의</h1>
        <p class="text-gray-500 mb-12">1:1 문의 게시판</p>

        <!-- 검색 + 필터 -->
        <div class="flex justify-between items-center mb-6 border-b-2 border-black pb-4">
            <div class="text-sm text-gray-500">
                전체 <span class="font-bold text-black" id="post-count">0</span>건
            </div>
            <div class="relative">
                <input type="text" id="searchInput" placeholder="검색..." aria-label="문의 검색"
                    class="border border-gray-300 pl-4 pr-10 py-2 text-sm rounded-none focus:border-black outline-none transition-colors"
                    onkeypress="if(event.key==='Enter') loadInquiries()">
                <button onclick="loadInquiries()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-black">
                    <span class="material-symbols-outlined text-lg">search</span>
                </button>
            </div>
        </div>

        <!-- 게시판 목록 -->
        <div class="w-full text-sm">
            <!-- 헤더 -->
            <div class="grid grid-cols-12 gap-4 py-3 border-b border-black font-bold text-center">
                <div class="col-span-1 hidden md:block">번호</div>
                <div class="col-span-10 md:col-span-8 text-left pl-4">제목</div>
                <div class="col-span-2 md:col-span-2">상태</div>
                <div class="col-span-1 hidden md:block">날짜</div>
            </div>

            <!-- 목록 (JS에서 동적 생성) -->
            <div id="inquiry-list">
                <div class="text-center py-12 text-gray-400">Loading...</div>
            </div>
        </div>

        <!-- 문의 작성 버튼 -->
        <div class="flex justify-end mt-8">
            <button onclick="openWriteModal()"
                class="bg-black text-white px-6 py-3 font-bold text-sm tracking-wide hover:bg-gray-800 transition-colors">
                문의 작성
            </button>
        </div>

        <!-- 페이지네이션 -->
        <div class="flex justify-center mt-12 space-x-2" id="pagination"></div>
    </main>

    <!-- 문의 작성 모달 -->
    <!-- 비유: 우체국 창구 — 일반 문의는 단순 편지, 샘플 요청은 등기 소포(받는 사람 주소 필수) -->
    <div id="writeModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-lg w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-bold" id="writeModalTitle">문의 작성</h2>
                    <button onclick="closeWriteModal()" class="text-gray-400 hover:text-black">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <!-- 샘플 모드 안내 배너 (?topic=sample일 때만 표시) -->
                <div id="sampleNotice" class="hidden mb-4 p-3 bg-yellow-50 border-l-4 border-yellow-400 text-xs text-yellow-800 rounded">
                    <strong>착불 발송 안내</strong> — 샘플은 <strong>착불</strong>로 발송됩니다(배송비는 받는 분 부담).<br>
                    원단·시안 검토 후 영업일 기준 1~2일 내 발송됩니다.
                </div>
                <form id="inquiryForm" onsubmit="submitInquiry(event)">
                    <div class="mb-4">
                        <label class="block text-xs font-bold text-gray-500 mb-1">제목</label>
                        <input type="text" id="inquiryTitle" required
                            class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black outline-none"
                            placeholder="문의 제목을 입력하세요">
                    </div>

                    <!-- 샘플 요청 전용 필드 묶음 (?topic=sample일 때만 보임, JS에서 hidden 토글) -->
                    <div id="sampleFields" class="hidden">
                        <div class="mb-4">
                            <label class="block text-xs font-bold text-gray-500 mb-1">샘플 종류 <span class="text-red-500">*</span></label>
                            <select id="sampleType"
                                class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black outline-none bg-white">
                                <option value="">선택해 주세요</option>
                                <option value="fabric">원단 샘플</option>
                                <option value="design">디자인 시안 샘플</option>
                                <option value="both">원단 + 디자인 시안 (둘 다)</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">받는 분 <span class="text-red-500">*</span></label>
                                <input type="text" id="sampleName"
                                    class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black outline-none"
                                    placeholder="이름">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">연락처 <span class="text-red-500">*</span></label>
                                <input type="tel" id="samplePhone"
                                    class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black outline-none"
                                    placeholder="010-0000-0000">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="block text-xs font-bold text-gray-500 mb-1">우편번호 <span class="text-red-500">*</span></label>
                            <div class="flex gap-2">
                                <input type="text" id="samplePostalCode" readonly
                                    class="w-32 border border-gray-300 rounded px-4 py-3 text-sm bg-gray-50 outline-none"
                                    placeholder="00000">
                                <button type="button" onclick="openPostcodeSearch()"
                                    class="px-4 py-3 bg-gray-100 hover:bg-gray-200 text-sm font-bold rounded transition-colors">
                                    주소 검색
                                </button>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="block text-xs font-bold text-gray-500 mb-1">기본 주소 <span class="text-red-500">*</span></label>
                            <input type="text" id="sampleAddress" readonly
                                class="w-full border border-gray-300 rounded px-4 py-3 text-sm bg-gray-50 outline-none"
                                placeholder="주소 검색을 눌러 주세요">
                        </div>
                        <div class="mb-4">
                            <label class="block text-xs font-bold text-gray-500 mb-1">상세 주소 <span class="text-red-500">*</span></label>
                            <input type="text" id="sampleAddressDetail"
                                class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black outline-none"
                                placeholder="동/호수 등 상세 주소">
                        </div>
                        <div class="mb-4">
                            <label class="block text-xs font-bold text-gray-500 mb-1">요청 사유 (선택)</label>
                            <textarea id="sampleReason" rows="3"
                                class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black outline-none resize-none"
                                placeholder="어떤 용도로 검토하시는지 적어 주시면 더 정확한 샘플을 보내드릴 수 있어요."></textarea>
                        </div>
                    </div>

                    <!-- 일반 문의 본문 (?topic=sample이 아닐 때만 표시) -->
                    <div id="inquiryContentWrap" class="mb-4">
                        <label class="block text-xs font-bold text-gray-500 mb-1">내용</label>
                        <textarea id="inquiryContent" rows="6"
                            class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black outline-none resize-none"
                            placeholder="문의 내용을 상세히 적어주세요"></textarea>
                    </div>
                    <div class="mb-6" id="inquirySecretWrap">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="inquirySecret" class="w-4 h-4">
                            <span class="text-sm text-gray-600">비밀글로 작성</span>
                        </label>
                    </div>
                    <button type="submit"
                        class="w-full bg-black text-white py-3 font-bold text-sm hover:bg-gray-800 transition-colors rounded">
                        등록하기
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- 문의 상세 모달 -->
    <div id="detailModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-lg w-full max-w-2xl max-h-[80vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex items-start justify-between mb-4">
                    <h2 class="text-xl font-bold" id="modalTitle"></h2>
                    <button onclick="closeDetailModal()" class="text-gray-400 hover:text-black">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <div class="text-xs text-gray-400 mb-4" id="modalMeta"></div>
                <div class="prose prose-sm max-w-none whitespace-pre-wrap mb-6" id="modalContent"></div>

                <!-- 답변 영역 -->
                <div id="modalAnswer" class="hidden">
                    <div class="border-t-2 border-brand-red pt-4 mt-4">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="material-symbols-outlined text-brand-red">support_agent</span>
                            <span class="font-bold text-sm">관리자 답변</span>
                            <span class="text-xs text-gray-400" id="modalAnsweredAt"></span>
                        </div>
                        <div class="prose prose-sm max-w-none whitespace-pre-wrap bg-gray-50 p-4 rounded" id="modalAnswerContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-black text-white"></footer>

    <script src="js/main.js" defer></script>
    <script src="js/header_render.js" defer></script>
    <script src="js/chatbot.js" defer></script>
    <script src="js/auth.js" defer></script>
    <!-- 다음 우편번호 검색 (샘플 요청 배송지 입력에 사용) — Daum/Kakao 무료 CDN -->
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script>
        let currentPage = 1;
        const PAGE_LIMIT = 10;
        // 샘플 요청 모드 플래그 — ?topic=sample 일 때 true. submitInquiry에서 분기 사용
        // 비유: 우체국에 들어갈 때 들고 온 봉투 종류(편지/소포)를 미리 메모해두는 셈
        let isSampleMode = false;

        document.addEventListener('DOMContentLoaded', () => {
            loadInquiries();
            // URL 파라미터 기반 딥링크 처리 (모달 자동 오픈 + 제목 프리필)
            handleInquiryDeepLink();
        });

        // URL 파라미터로 들어온 문의 맥락 처리
        // - ?topic=password-reset → login.html "비밀번호 찾기"에서 유입 → 비밀번호 재설정 문의
        // - ?topic=sample        → 샘플 요청 (샘플 종류/배송지 입력 폼 활성화)
        // - ?source=custom       → custom.html "무료 시안 요청" 카드에서 유입 → 시안 문의
        // 비로그인 사용자는 openWriteModal()이 login.html로 리다이렉트하므로 로직 전체 스킵
        function handleInquiryDeepLink() {
            try {
                const params = new URLSearchParams(location.search);
                const topic = params.get('topic');
                const source = params.get('source');
                if (!topic && !source) return; // 일반 접근이면 무시

                // 파라미터별 기본 제목 매핑
                let presetTitle = null;
                if (topic === 'password-reset') {
                    presetTitle = '[비밀번호 재설정] 로그인 도움 요청';
                } else if (topic === 'sample') {
                    presetTitle = '[샘플 요청] 원단/시안 샘플 발송 요청';
                    isSampleMode = true; // 샘플 모드 ON — 추가 필드 노출 + 제출 분기
                } else if (source === 'custom') {
                    presetTitle = '[무료 시안 요청] 디자이너 시안 문의';
                }
                if (!presetTitle) return; // 알 수 없는 값이면 무시

                // 비로그인 상태면 조용히 스킵 (openWriteModal이 강제 리다이렉트하므로 UX 훼손 방지)
                if (typeof isLoggedIn === 'function' && !isLoggedIn()) return;

                // 기존 전역 함수로 모달 오픈 (비로그인 체크/display 처리 재사용)
                if (typeof openWriteModal === 'function') {
                    openWriteModal();
                }

                // 제목 프리필 — 사용자가 이미 입력했다면 덮어쓰지 않음
                const titleInput = document.getElementById('inquiryTitle');
                if (titleInput && !titleInput.value) {
                    titleInput.value = presetTitle;
                }
            } catch (e) {
                console.warn('[inquiry] deep-link prefill failed:', e);
            }
        }

        // 다음 우편번호 검색 팝업 — 결과를 폼에 채워 넣음
        // 비유: "주소 검색" 버튼을 누르면 작은 검색창이 뜨고, 고른 주소가 자동으로 칸에 들어감
        function openPostcodeSearch() {
            if (typeof daum === 'undefined' || !daum.Postcode) {
                alert('우편번호 검색을 불러올 수 없습니다. 새로고침 후 다시 시도해 주세요.');
                return;
            }
            new daum.Postcode({
                oncomplete: function (data) {
                    // 도로명 주소 우선, 없으면 지번 주소 사용
                    const addr = data.roadAddress || data.jibunAddress || '';
                    document.getElementById('samplePostalCode').value = data.zonecode || '';
                    document.getElementById('sampleAddress').value = addr;
                    // 입력 편의 — 상세 주소 칸으로 포커스 이동
                    document.getElementById('sampleAddressDetail').focus();
                }
            }).open();
        }

        // 문의 목록 로드
        async function loadInquiries(page = 1) {
            currentPage = page;
            const token = getToken();
            if (!token) {
                document.getElementById('inquiry-list').innerHTML =
                    '<div class="text-center py-12 text-gray-400">로그인 후 문의 내역을 확인할 수 있습니다.</div>';
                return;
            }

            const search = document.getElementById('searchInput')?.value || '';
            const params = new URLSearchParams({ type: 'inquiry', page, limit: PAGE_LIMIT });
            if (search) params.set('search', search);

            try {
                const res = await fetch(`/api/board?${params}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);

                document.getElementById('post-count').textContent = data.total;
                renderInquiryList(data.posts, data.total, page);
                renderPagination(data.page, data.totalPages);
            } catch (err) {
                console.error('[Inquiry] 목록 로드 실패:', err);
                document.getElementById('inquiry-list').innerHTML =
                    '<div class="text-center py-12 text-gray-400">문의 목록을 불러올 수 없습니다.</div>';
            }
        }

        // 문의 목록 렌더링
        function renderInquiryList(posts, total, page) {
            const container = document.getElementById('inquiry-list');
            if (!posts.length) {
                container.innerHTML = '<div class="text-center py-12 text-gray-400">등록된 문의가 없습니다.</div>';
                return;
            }

            const startNum = total - (page - 1) * PAGE_LIMIT;

            container.innerHTML = posts.map((post, i) => {
                const date = new Date(post.createdAt).toLocaleDateString('ko-KR');
                const num = startNum - i;
                // 답변 상태 배지
                const statusBadge = post.isAnswered
                    ? '<span class="bg-black text-white text-[10px] px-2 py-0.5 rounded font-bold">답변완료</span>'
                    : '<span class="bg-gray-200 text-gray-600 text-[10px] px-2 py-0.5 rounded font-bold">대기중</span>';
                // 비밀글 아이콘
                const lockIcon = post.isSecret
                    ? '<span class="material-symbols-outlined text-gray-400 text-base mr-1" style="font-size:16px">lock</span>'
                    : '';

                return `
                <div class="grid grid-cols-12 gap-4 py-4 border-b border-gray-100 items-center text-center hover:bg-gray-50 transition-colors cursor-pointer"
                     onclick="viewInquiry(${post.id})">
                    <div class="col-span-1 hidden md:block text-gray-500">${num}</div>
                    <div class="col-span-10 md:col-span-8 text-left pl-4 flex items-center">
                        ${lockIcon}
                        <span class="font-medium text-gray-900">${escapeHtml(post.title)}</span>
                    </div>
                    <div class="col-span-2 md:col-span-2">${statusBadge}</div>
                    <div class="col-span-1 hidden md:block text-gray-400 text-xs">${date}</div>
                </div>`;
            }).join('');
        }

        // 페이지네이션
        function renderPagination(current, totalPages) {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) { container.innerHTML = ''; return; }

            let html = '';
            html += `<button onclick="loadInquiries(${Math.max(1, current - 1)})"
                class="w-8 h-8 flex items-center justify-center border border-gray-200 text-gray-400 hover:text-black hover:border-black transition-colors">&lt;</button>`;
            for (let i = 1; i <= totalPages; i++) {
                html += i === current
                    ? `<button class="w-8 h-8 flex items-center justify-center bg-black text-white font-bold">${i}</button>`
                    : `<button onclick="loadInquiries(${i})" class="w-8 h-8 flex items-center justify-center border border-gray-200 text-gray-500 hover:text-black hover:border-black transition-colors">${i}</button>`;
            }
            html += `<button onclick="loadInquiries(${Math.min(totalPages, current + 1)})"
                class="w-8 h-8 flex items-center justify-center border border-gray-200 text-gray-400 hover:text-black hover:border-black transition-colors">&gt;</button>`;
            container.innerHTML = html;
        }

        // 문의 상세 보기
        async function viewInquiry(id) {
            const token = getToken();
            try {
                const res = await fetch(`/api/board/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);

                const post = data.post;
                document.getElementById('modalTitle').textContent = post.title;
                document.getElementById('modalMeta').textContent =
                    `${post.authorName} | ${new Date(post.createdAt).toLocaleDateString('ko-KR')}`;
                document.getElementById('modalContent').textContent = post.content;

                // 답변이 있으면 표시
                const answerSection = document.getElementById('modalAnswer');
                if (post.isAnswered && post.answer) {
                    document.getElementById('modalAnswerContent').textContent = post.answer;
                    document.getElementById('modalAnsweredAt').textContent =
                        post.answeredAt ? new Date(post.answeredAt).toLocaleDateString('ko-KR') : '';
                    answerSection.classList.remove('hidden');
                } else {
                    answerSection.classList.add('hidden');
                }

                document.getElementById('detailModal').classList.remove('hidden');
            } catch (err) {
                alert(err.message || '게시글을 불러올 수 없습니다.');
            }
        }

        // 모달 열기/닫기
        // 샘플 모드일 때는 추가 필드(샘플 종류/배송지) 영역을 보여주고 제목/안내 문구도 바꾼다
        function openWriteModal() {
            if (!isLoggedIn()) {
                alert('로그인이 필요합니다.');
                location.href = 'login.html';
                return;
            }
            const sampleFields = document.getElementById('sampleFields');
            const sampleNotice = document.getElementById('sampleNotice');
            const titleEl = document.getElementById('writeModalTitle');
            const contentWrap = document.getElementById('inquiryContentWrap');
            const secretWrap = document.getElementById('inquirySecretWrap');
            if (isSampleMode) {
                sampleFields.classList.remove('hidden');   // 샘플 필드 표시
                sampleNotice.classList.remove('hidden');   // 착불 안내 표시
                if (titleEl) titleEl.textContent = '샘플 요청 작성';
                // 샘플 모드에서는 일반 본문/비밀글 체크박스는 숨김 (요청 사유로 대체)
                if (contentWrap) contentWrap.classList.add('hidden');
                if (secretWrap) secretWrap.classList.add('hidden');
                // 본문은 서버 NOT NULL 컬럼이므로 자동 채움(아래 submit에서 사유로 합성)
                document.getElementById('inquiryContent').required = false;
            } else {
                sampleFields.classList.add('hidden');
                sampleNotice.classList.add('hidden');
                if (titleEl) titleEl.textContent = '문의 작성';
                if (contentWrap) contentWrap.classList.remove('hidden');
                if (secretWrap) secretWrap.classList.remove('hidden');
                document.getElementById('inquiryContent').required = true;
            }
            document.getElementById('writeModal').classList.remove('hidden');
        }
        function closeWriteModal() {
            document.getElementById('writeModal').classList.add('hidden');
            document.getElementById('inquiryForm').reset();
        }
        function closeDetailModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        // 한국 휴대폰 번호 간단 검증 — 010/011/016/017/018/019 + 7~8자리
        // 비유: 우체부가 받을 수 있는 양식의 번호인지 미리 확인하는 셈
        function isValidKoreanPhone(v) {
            if (!v) return false;
            const digits = v.replace(/[^0-9]/g, '');
            return /^(01[016789])\d{7,8}$/.test(digits);
        }

        // 문의 제출 (일반 / 샘플 분기)
        async function submitInquiry(e) {
            e.preventDefault();
            const token = getToken();
            if (!token) { alert('로그인이 필요합니다.'); return; }

            const title = document.getElementById('inquiryTitle').value.trim();
            if (!title) { alert('제목을 입력해주세요.'); return; }

            // ────────── 샘플 요청 분기 ──────────
            if (isSampleMode) {
                const sampleType = document.getElementById('sampleType').value;
                const name = document.getElementById('sampleName').value.trim();
                const phone = document.getElementById('samplePhone').value.trim();
                const postalCode = document.getElementById('samplePostalCode').value.trim();
                const address = document.getElementById('sampleAddress').value.trim();
                const addressDetail = document.getElementById('sampleAddressDetail').value.trim();
                const reason = document.getElementById('sampleReason').value.trim();

                // 입력 검증 — 우편번호 5자리, 전화번호 한국 형식, 빈값 차단
                if (!sampleType) { alert('샘플 종류를 선택해 주세요.'); return; }
                if (!name) { alert('받는 분 이름을 입력해 주세요.'); return; }
                if (!isValidKoreanPhone(phone)) { alert('올바른 휴대폰 번호를 입력해 주세요. 예) 010-1234-5678'); return; }
                if (!/^\d{5}$/.test(postalCode)) { alert('우편번호 검색 버튼으로 우편번호를 채워 주세요.'); return; }
                if (!address) { alert('기본 주소를 입력해 주세요. (주소 검색 사용)'); return; }
                if (!addressDetail) { alert('상세 주소를 입력해 주세요.'); return; }

                // 본문은 NOT NULL이므로 사용자에게 보일 요약문을 자동 합성
                const contentSummary =
                    `[샘플 요청]\n종류: ${({fabric:'원단',design:'시안',both:'원단+시안'}[sampleType] || sampleType)}\n` +
                    `받는 분: ${name} (${phone})\n` +
                    `주소: (${postalCode}) ${address} ${addressDetail}\n` +
                    (reason ? `사유: ${reason}` : '사유: (미기재)');

                try {
                    const res = await fetch('/api/board', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            boardType: 'sample',          // 샘플 요청 신규 타입
                            title,
                            content: contentSummary,
                            isSecret: true,               // 배송지 포함이라 기본 비밀글
                            sampleData: { sampleType, name, phone, postalCode, address, addressDetail, reason }
                        })
                    });
                    const data = await res.json();
                    if (!data.success) throw new Error(data.error);

                    alert('샘플 요청이 접수되었습니다. 검토 후 연락드리겠습니다.');
                    closeWriteModal();
                    isSampleMode = false; // 다음 모달 오픈 시 일반 모드로 복귀
                    location.href = 'inquiry.html'; // ?topic=sample 제거
                } catch (err) {
                    alert(err.message || '샘플 요청 등록에 실패했습니다.');
                }
                return;
            }

            // ────────── 일반 문의 (기존 흐름) ──────────
            const content = document.getElementById('inquiryContent').value.trim();
            const isSecret = document.getElementById('inquirySecret').checked;
            if (!content) { alert('내용을 입력해주세요.'); return; }

            try {
                const res = await fetch('/api/board', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ boardType: 'inquiry', title, content, isSecret })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);

                alert('문의가 등록되었습니다.');
                closeWriteModal();
                loadInquiries(); // 목록 새로고침
            } catch (err) {
                alert(err.message || '문의 등록에 실패했습니다.');
            }
        }

        // XSS 방지
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // 모달 바깥 클릭 닫기
        ['writeModal', 'detailModal'].forEach(id => {
            document.getElementById(id)?.addEventListener('click', (e) => {
                if (e.target === e.currentTarget) {
                    document.getElementById(id).classList.add('hidden');
                }
            });
        });
    </script>
</body>

</html>
