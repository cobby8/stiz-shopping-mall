<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIZ - Portfolio</title>
    <!-- SEO 메타 태그 -->
    <meta name="description" content="STIZ 포트폴리오. 프로 팀부터 동호회까지 다양한 제작 사례를 확인하세요.">
    <meta property="og:title" content="STIZ Portfolio">
    <meta property="og:description" content="STIZ 포트폴리오. 프로 팀부터 동호회까지 다양한 제작 사례를 확인하세요.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/hero_bg.jpg">
    <link rel="canonical" href="https://stiz.co.kr/lookbook.html">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <!-- Material Symbols (아이콘 폰트) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="font-sans antialiased text-gray-900 bg-white">

    <header></header>
    <div class="h-20"></div>
    <div class="h-20"></div>

    <main class="container mx-auto px-6 py-12">
        <!-- 페이지 타이틀 -->
        <div class="text-center mb-16">
            <h1 class="text-4xl font-bold tracking-tight mb-4">OUR PORTFOLIO</h1>
            <p class="text-gray-500 max-w-2xl mx-auto">
                Discover how top teams are winning with STIZ. <br>
                From professional leagues to local clubs, we design victory.
            </p>
        </div>

        <!-- 필터 바: 종목별 탭 버튼 -->
        <div id="filter-bar" class="flex flex-wrap justify-center gap-2 mb-12">
            <button id="filter-all" onclick="filterBySport('all')"
                class="px-5 py-2 rounded-full text-xs font-bold bg-black text-white border border-black transition-colors">
                <span class="material-symbols-outlined text-sm align-middle mr-1">filter_list</span>전체
            </button>
            <button id="filter-soccer" onclick="filterBySport('soccer')"
                class="px-5 py-2 rounded-full text-xs font-bold bg-white text-gray-500 border border-gray-200 hover:border-black hover:text-black transition-colors">
                축구
            </button>
            <button id="filter-basketball" onclick="filterBySport('basketball')"
                class="px-5 py-2 rounded-full text-xs font-bold bg-white text-gray-500 border border-gray-200 hover:border-black hover:text-black transition-colors">
                농구
            </button>
            <button id="filter-volleyball" onclick="filterBySport('volleyball')"
                class="px-5 py-2 rounded-full text-xs font-bold bg-white text-gray-500 border border-gray-200 hover:border-black hover:text-black transition-colors">
                배구
            </button>
            <button id="filter-baseball" onclick="filterBySport('baseball')"
                class="px-5 py-2 rounded-full text-xs font-bold bg-white text-gray-500 border border-gray-200 hover:border-black hover:text-black transition-colors">
                야구
            </button>
            <button id="filter-etc" onclick="filterBySport('etc')"
                class="px-5 py-2 rounded-full text-xs font-bold bg-white text-gray-500 border border-gray-200 hover:border-black hover:text-black transition-colors">
                기타
            </button>
        </div>

        <!-- 카드 그리드 컨테이너 (JS가 동적으로 채움) -->
        <!-- grid-cols-1: 모바일 1열 / md: 2열 / lg: 3열 -->
        <div id="gallery-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- JS가 렌더링 -->
        </div>

        <!-- 더보기 버튼 (8개 초과 시에만 표시) -->
        <div class="mt-16 text-center">
            <button id="load-more-btn" onclick="loadMoreLookbook()" style="display: none;"
                class="bg-black text-white px-10 py-4 font-bold tracking-widest hover:bg-gray-800 transition-colors uppercase">
                더보기
            </button>
        </div>
    </main>

    <!-- 상세 모달: 카드 클릭 시 팝업 -->
    <!-- hidden: 기본 숨김 / fixed inset-0: 전체 화면 / z-50: 최상위 -->
    <div id="detail-modal" class="hidden fixed inset-0 z-50 items-center justify-center p-4 bg-black/60" onclick="closeDetailModal()">
        <!-- 모달 본체 (클릭 이벤트 전파 차단) -->
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl" onclick="event.stopPropagation()">
            <!-- 모달 이미지 -->
            <div class="relative">
                <img id="modal-image" src="" alt="" class="w-full aspect-[16/9] object-cover rounded-t-2xl">
                <!-- 닫기 버튼 -->
                <button onclick="closeDetailModal()"
                    class="absolute top-4 right-4 w-10 h-10 bg-white/90 backdrop-blur-sm rounded-full flex items-center justify-center hover:bg-white transition-colors shadow-lg">
                    <span class="material-symbols-outlined text-gray-900">close</span>
                </button>
            </div>
            <!-- 모달 정보 -->
            <div class="p-6 md:p-8">
                <div class="flex items-center gap-2 mb-2">
                    <span id="modal-sport" class="text-xs text-gray-400 uppercase tracking-wider"></span>
                </div>
                <h2 id="modal-team" class="text-2xl font-bold mb-4"></h2>
                <p id="modal-desc" class="text-gray-600 text-sm leading-relaxed mb-6"></p>
                <!-- 사용 제품 태그 -->
                <div class="mb-6">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">사용 제품</h3>
                    <div id="modal-products" class="flex flex-wrap gap-2">
                        <!-- JS가 태그를 렌더링 -->
                    </div>
                </div>
                <!-- CTA 버튼 -->
                <a href="inquiry.html"
                    class="inline-block bg-black text-white px-8 py-3 font-bold text-sm tracking-widest hover:bg-gray-800 transition-colors uppercase">
                    문의하기
                </a>
            </div>
        </div>
    </div>

    <footer class="bg-black text-white" data-include="layout/footer.html"></footer>

    <!-- 스크립트: 데이터 먼저, 그 다음 로직 -->
    <script src="js/product-data.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/header_render.js" defer></script>
    <script src="js/chatbot.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/lookbook-data.js" defer></script>
    <script src="js/lookbook.js" defer></script>
</body>

</html>
