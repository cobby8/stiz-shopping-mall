<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="icon" type="image/png" href="images/favicon-32.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIZ - Login</title>
    <!-- SEO 메타 태그 -->
    <meta name="description" content="STIZ 로그인. 팀 유니폼 주문 내역과 디자인을 관리하세요.">
    <meta property="og:title" content="STIZ Login">
    <meta property="og:description" content="STIZ 로그인. 팀 유니폼 주문 내역과 디자인을 관리하세요.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/hero_bg.jpg">
    <link rel="canonical" href="https://stiz.co.kr/login.html">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="font-sans antialiased text-gray-900 bg-white">

    <header></header>
    <div class="h-20"></div>
    <div class="h-20"></div>

    <main class="container mx-auto px-6 py-20 max-w-md">
        <h1 class="text-3xl font-bold mb-10 text-center tracking-tight">로그인</h1>

        <div class="space-y-4">
            <div>
                <!-- aria-label: 스크린리더가 이 입력란의 용도를 읽어줌 -->
                <input type="email" id="email" placeholder="이메일" aria-label="이메일 주소"
                    class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black focus:ring-black outline-none transition-colors">
            </div>
            <div>
                <input type="password" id="password" placeholder="비밀번호" aria-label="비밀번호"
                    class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black focus:ring-black outline-none transition-colors"
                    onkeydown="if(event.key==='Enter') handleLogin()">
            </div>

            <!-- 에러 메시지 표시 영역 -->
            <p id="login-error" class="text-xs text-red-500 hidden"></p>

            <div class="flex justify-between items-center text-xs text-gray-500">
                <label class="flex items-center">
                    <input type="checkbox" class="mr-2 rounded border-gray-300 text-black focus:ring-black"> 로그인 유지
                </label>
                <a href="notice.html" class="underline">비밀번호 찾기</a>
            </div>

            <button onclick="handleLogin()" id="login-btn"
                class="w-full bg-black text-white py-4 font-bold rounded hover:bg-gray-800 transition-colors uppercase">
                로그인
            </button>
        </div>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-200"></div>
            </div>
            <div class="relative flex justify-center text-xs">
                <span class="bg-white px-2 text-gray-500 uppercase">또는</span>
            </div>
        </div>

        <!-- SNS 로그인 버튼 — 서버에서 설정 상태를 확인 후 활성/비활성 결정 -->
        <div id="snsLoginBtns" class="grid grid-cols-2 gap-4">
            <button id="kakaoLoginBtn" onclick="snsLogin('kakao')" disabled
                class="flex items-center justify-center border border-gray-300 py-3 rounded opacity-40 cursor-not-allowed">
                <span class="font-bold text-sm" style="color:#FEE500;text-shadow:0 0 1px #000">Kakao</span>
            </button>
            <button id="naverLoginBtn" onclick="snsLogin('naver')" disabled
                class="flex items-center justify-center border border-gray-300 py-3 rounded opacity-40 cursor-not-allowed">
                <span class="font-bold text-sm" style="color:#03C75A">Naver</span>
            </button>
        </div>

        <div class="mt-8 text-center text-sm text-gray-600">
            아직 회원이 아니신가요?
            <a href="join.html" class="text-black font-bold underline">회원가입하기</a>
        </div>

    </main>

    <footer class="bg-black text-white" data-include="layout/footer.html"></footer>

    <script src="js/main.js" defer></script>
    <script src="js/header_render.js" defer></script>
    <script src="js/chatbot.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script>
        // 이미 로그인된 상태면 마이페이지로 이동
        if (isLoggedIn()) {
            location.href = 'myshop.html';
        }

        // 로그인 처리 — async로 서버 API 호출
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errEl = document.getElementById('login-error');
            const loginBtn = document.getElementById('login-btn');

            // 에러 초기화
            errEl.classList.add('hidden');

            // 버튼 비활성화 (중복 클릭 방지)
            loginBtn.disabled = true;
            loginBtn.innerText = '로그인 중...';

            // 서버 API 호출 (auth.js의 login 함수)
            const result = await login(email, password);

            // 버튼 복구
            loginBtn.disabled = false;
            loginBtn.innerText = '로그인';

            if (result.success) {
                // 관리자이면 관리자 페이지로, 일반 고객이면 마이페이지로
                if (result.user.role === 'admin') {
                    location.href = result.user.defaultPage || 'admin.html';
                } else {
                    location.href = 'myshop.html';
                }
            } else {
                errEl.innerText = result.error;
                errEl.classList.remove('hidden');
            }
        }

        // SNS 로그인 버튼 클릭 — 서버로 리다이렉트
        function snsLogin(provider) {
            // 서버의 /api/auth/kakao 또는 /api/auth/naver로 이동
            // 서버가 카카오/네이버 로그인 페이지로 리다이렉트 시켜줌
            window.location.href = '/api/auth/' + provider;
        }

        // 서버에서 SNS 설정 상태를 확인 → 키가 등록된 SNS만 버튼 활성화
        (async function checkSnsStatus() {
            try {
                const resp = await fetch('/api/auth/sns/status');
                const data = await resp.json();
                // 카카오 키가 설정되어 있으면 버튼 활성화
                if (data.kakao) {
                    const btn = document.getElementById('kakaoLoginBtn');
                    btn.disabled = false;
                    btn.classList.remove('opacity-40', 'cursor-not-allowed');
                    btn.classList.add('hover:bg-yellow-50');
                }
                // 네이버 키가 설정되어 있으면 버튼 활성화
                if (data.naver) {
                    const btn = document.getElementById('naverLoginBtn');
                    btn.disabled = false;
                    btn.classList.remove('opacity-40', 'cursor-not-allowed');
                    btn.classList.add('hover:bg-green-50');
                }
            } catch (e) {
                // API 호출 실패 시 버튼 비활성 상태 유지 (에러 무시)
            }
        })();
    </script>
</body>

</html>
