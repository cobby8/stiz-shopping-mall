<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIZ SHOP - 장바구니</title>
    <meta name="description" content="STIZ 장바구니. 담은 상품을 확인하고 주문하세요.">
    <link rel="icon" type="image/png" href="images/logo_black.png">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Pretendard 폰트 -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <!-- Material Symbols (아이콘) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="font-sans antialiased text-gray-900 bg-white">

    <!-- 헤더 (header_render.js가 자동 삽입) -->
    <header></header>
    <div class="h-20"></div>
    <div class="h-20"></div>

    <!-- ===== 브레드크럼 ===== -->
    <nav class="max-w-5xl mx-auto px-4 pt-4 pb-2">
        <div class="flex items-center gap-2 text-sm text-gray-400">
            <a href="index.html" class="hover:text-gray-600">HOME</a>
            <span>/</span>
            <a href="shop.html" class="hover:text-gray-600">SHOP</a>
            <span>/</span>
            <span class="text-gray-900 font-medium">장바구니</span>
        </div>
    </nav>

    <!-- ===== 페이지 타이틀 ===== -->
    <section class="max-w-5xl mx-auto px-4 pt-4 pb-6">
        <h1 class="text-3xl font-bold tracking-tight">장바구니</h1>
        <p class="text-gray-400 mt-1" id="cartItemCount">0개의 상품</p>
    </section>

    <!-- ===== 장바구니 콘텐츠 ===== -->
    <section class="max-w-5xl mx-auto px-4 pb-16">
        <div class="flex flex-col lg:flex-row gap-8">

            <!-- 좌측: 장바구니 아이템 목록 -->
            <div class="flex-1">
                <!-- 전체 선택 / 선택 삭제 바 -->
                <div class="flex items-center justify-between py-3 border-b border-gray-200 mb-2">
                    <label class="flex items-center gap-2 cursor-pointer text-sm">
                        <input type="checkbox" id="checkAll" checked
                            class="w-4 h-4 accent-brand-black rounded">
                        <span>전체 선택</span>
                    </label>
                    <button onclick="removeSelected()" class="text-sm text-gray-400 hover:text-brand-red transition-colors">
                        선택 삭제
                    </button>
                </div>

                <!-- 장바구니 아이템 컨테이너 -->
                <div id="cartItems">
                    <!-- cart-page.js에서 동적 생성 -->
                </div>

                <!-- 빈 장바구니 메시지 (숨김 상태) -->
                <div id="emptyCart" class="hidden text-center py-20">
                    <span class="material-symbols-outlined text-7xl text-gray-200">shopping_cart</span>
                    <p class="text-gray-400 mt-4 text-lg font-medium">장바구니가 비어있습니다</p>
                    <p class="text-gray-300 text-sm mt-1">마음에 드는 상품을 담아보세요</p>
                    <a href="shop.html"
                        class="inline-block mt-6 px-8 py-3 bg-brand-black text-white text-sm font-medium rounded-lg hover:bg-gray-800 transition-colors">
                        쇼핑 계속하기
                    </a>
                </div>
            </div>

            <!-- 우측: 주문 요약 사이드바 -->
            <div class="w-full lg:w-80 lg:flex-shrink-0">
                <div class="bg-gray-50 rounded-xl p-6 sticky top-24">
                    <h2 class="font-bold text-lg mb-5">주문 요약</h2>

                    <!-- 상품 금액 -->
                    <div class="flex justify-between mb-3 text-sm">
                        <span class="text-gray-500">상품 금액</span>
                        <span class="font-medium" id="summarySubtotal">0원</span>
                    </div>

                    <!-- 배송비 -->
                    <div class="flex justify-between mb-3 text-sm">
                        <span class="text-gray-500">배송비</span>
                        <span class="font-medium" id="summaryShipping">0원</span>
                    </div>

                    <!-- 무료배송 프로그레스 바 -->
                    <div id="freeShippingBar" class="hidden mb-4">
                        <div class="w-full bg-gray-200 rounded-full h-1.5">
                            <div id="shippingProgress" class="bg-brand-black h-1.5 rounded-full transition-all duration-300" style="width:0%"></div>
                        </div>
                        <p class="text-xs text-gray-400 mt-1" id="shippingMessage"></p>
                    </div>

                    <!-- 구분선 -->
                    <hr class="my-4">

                    <!-- 총 결제 금액 -->
                    <div class="flex justify-between items-center mb-6">
                        <span class="font-bold">총 결제 금액</span>
                        <span class="text-xl font-bold text-brand-red" id="summaryTotal">0원</span>
                    </div>

                    <!-- 주문하기 버튼 -->
                    <button id="checkoutBtn" onclick="goToCheckout()"
                        class="w-full py-3.5 bg-brand-black text-white font-medium rounded-lg hover:bg-gray-800 transition-colors flex items-center justify-center gap-2 disabled:bg-gray-300 disabled:cursor-not-allowed">
                        <span class="material-symbols-outlined text-xl">shopping_cart_checkout</span>
                        주문하기
                    </button>

                    <!-- 쇼핑 계속하기 -->
                    <a href="shop.html"
                        class="block w-full mt-3 py-3 text-center border border-gray-200 text-sm font-medium rounded-lg hover:border-brand-black transition-colors">
                        쇼핑 계속하기
                    </a>

                    <!-- 안내 문구 -->
                    <p class="text-xs text-gray-400 mt-4 text-center">
                        5만원 이상 구매 시 무료배송
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- 하단 스크립트 -->
    <script src="js/header_render.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/cart-page.js"></script>
</body>

</html>
