<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="icon" type="image/png" href="images/favicon-32.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIZ Admin - 상품 카탈로그 설정</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Pretendard 폰트 -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <!-- Material Symbols (아이콘) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <style>
        /* ===== 탭 메뉴 스타일 ===== */
        .tab-btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            color: #6b7280;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }
        .tab-btn:hover { color: #111827; }
        .tab-btn.active {
            color: #111827;
            border-bottom-color: #E63946;
        }

        /* ===== 항목 카드 ===== */
        .item-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            transition: box-shadow 0.15s;
        }
        .item-card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .item-card.inactive {
            opacity: 0.5;
            background: #f9fafb;
        }

        /* ===== 토글 스위치 ===== */
        .toggle-switch {
            width: 40px;
            height: 22px;
            border-radius: 11px;
            background: #d1d5db;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toggle-switch.on { background: #22c55e; }
        .toggle-switch::after {
            content: '';
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }
        .toggle-switch.on::after { transform: translateX(18px); }

        /* ===== 모달 ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        /* ===== 토스트 알림 ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            z-index: 200;
            animation: slideUp 0.3s ease-out;
        }
        .toast.success { background: #16a34a; }
        .toast.error { background: #dc2626; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== CSV 가져오기 모달 (넓은 모달) ===== */
        .modal-box.wide {
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
        }
        /* 스텝 인디케이터 */
        .step-indicator {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 20px;
        }
        .step-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            background: #e5e7eb;
            color: #9ca3af;
        }
        .step-dot.active { background: #E63946; color: #fff; }
        .step-dot.done { background: #22c55e; color: #fff; }
        .step-line { flex: 1; height: 2px; background: #e5e7eb; }
        .step-line.active { background: #E63946; }
        /* 드래그 영역 */
        .drop-zone {
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #E63946;
            background: #fef2f2;
        }
        /* CSV 미리보기 테이블 */
        .csv-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .csv-table th {
            background: #f3f4f6;
            padding: 8px 12px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        .csv-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #f3f4f6;
        }
        .csv-table tr:hover td { background: #f9fafb; }
        /* 매핑 행 */
        .mapping-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f3f4f6;
        }
        .mapping-arrow {
            color: #9ca3af;
            font-size: 20px;
        }

        /* ===== 견적 시뮬레이션 박스 ===== */
        .sim-box {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border: 1px solid #bae6fd;
            border-radius: 12px;
            padding: 20px;
        }

        /* ===== 가격표 매트릭스 테이블 ===== */
        .price-matrix {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .price-matrix th {
            background: #f3f4f6;
            padding: 10px 14px;
            text-align: center;
            font-weight: 600;
            border: 1px solid #e5e7eb;
            white-space: nowrap;
        }
        .price-matrix td {
            padding: 6px 10px;
            border: 1px solid #e5e7eb;
            text-align: center;
        }
        .price-matrix td.editable {
            cursor: pointer;
            transition: background 0.15s;
        }
        .price-matrix td.editable:hover {
            background: #eff6ff;
        }
        .price-matrix td.na {
            background: #f9fafb;
            color: #d1d5db;
        }
        .price-matrix td input {
            width: 80px;
            text-align: right;
            border: 1px solid #3b82f6;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 13px;
            font-family: monospace;
        }
        .price-matrix .row-label {
            text-align: left;
            font-weight: 500;
            background: #fafafa;
        }
        /* 종목 필터 버튼 */
        .filter-btn {
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            transition: all 0.15s;
        }
        .filter-btn:hover { border-color: #9ca3af; }
        .filter-btn.active {
            background: #111827;
            color: #fff;
            border-color: #111827;
        }
    </style>
</head>

<body class="font-sans antialiased bg-gray-50 text-gray-900 min-h-screen" data-pc-only="true">

    <!-- ========================================== -->
    <!-- 관리자 헤더 -->
    <!-- ========================================== -->
    <header class="bg-brand-black text-white sticky top-0 z-50">
        <div class="container mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <!-- 햄버거 버튼: md 미만(스마트폰/태블릿 세로)에서만 노출, admin-common.js의 initMobileDrawer가 자동 바인딩 -->
                <button id="adminMobileToggle" type="button"
                    class="md:hidden inline-flex items-center justify-center w-11 h-11 -ml-2 text-gray-300 hover:text-white"
                    aria-label="메뉴 열기" aria-controls="adminMobileDrawer" aria-expanded="false">
                    <span class="material-symbols-outlined text-2xl">menu</span>
                </button>
                <a href="index.html" class="text-xl font-bold tracking-tight">STIZ</a>
                <span class="bg-brand-red text-white text-xs font-bold px-2 py-0.5 rounded">ADMIN</span>
            </div>

            <nav class="hidden md:flex items-center space-x-8">
                <a id="nav-home" href="admin-home.html" class="text-gray-400 hover:text-white transition-colors">홈</a>
                <a id="nav-all" href="admin.html" class="text-gray-400 hover:text-white transition-colors">전체 주문</a>
                <a id="nav-design" href="admin-design.html" data-admin-scope="all,design" class="text-gray-400 hover:text-white transition-colors">디자인 파트</a>
                <a id="nav-cs" href="admin-cs.html" data-admin-scope="all,cs" class="text-gray-400 hover:text-white transition-colors">CS 파트</a>
                <a id="nav-production" href="admin-production.html" data-admin-scope="all,production" class="text-gray-400 hover:text-white transition-colors">제작 파트</a>
                <a id="nav-shipping" href="admin-shipping.html" data-admin-scope="all,shipping" class="text-gray-400 hover:text-white transition-colors">출고 파트</a>
                <a id="nav-calendar" href="admin-calendar.html" class="text-gray-400 hover:text-white transition-colors">일정표</a>
                <a id="nav-analytics" href="admin-analytics.html" class="text-gray-400 hover:text-white transition-colors">매출 분석</a>
                <a id="nav-customers" href="admin-customers.html" class="text-gray-400 hover:text-white transition-colors">고객 관리</a>
                <a id="nav-catalog" href="admin-catalog.html" class="text-white font-medium border-b-2 border-brand-red pb-1">상품설정</a>
                <a id="nav-products" href="admin-products.html" class="text-gray-400 hover:text-white transition-colors">상품관리</a>
                <a id="nav-faq" href="admin-faq.html" class="text-gray-400 hover:text-white transition-colors">챗봇 FAQ</a>
                <a id="nav-store" href="index.html" class="text-gray-400 hover:text-white transition-colors">쇼핑몰 보기</a>
            </nav>

            <div class="flex items-center space-x-4">
                <span id="admin-name" class="text-sm text-gray-300"></span>
                <a href="admin-settings.html" class="text-gray-400 hover:text-white transition-colors" title="설정">
                    <span class="material-symbols-outlined text-xl">settings</span>
                </a>
                <button onclick="handleLogout()"
                    class="text-sm text-gray-400 hover:text-white transition-colors flex items-center space-x-1">
                    <span class="material-symbols-outlined text-base">logout</span>
                    <span>로그아웃</span>
                </button>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- 모바일/태블릿 드로어: 상품설정이 활성 -->
        <!-- ========================================== -->
        <div id="adminMobileDrawer" class="md:hidden hidden fixed inset-0 z-50" role="dialog" aria-modal="true" aria-hidden="true" aria-label="관리자 메뉴">
            <div data-drawer-overlay class="absolute inset-0 bg-black/60"></div>
            <aside class="relative bg-brand-black text-white w-72 max-w-[85%] h-full shadow-xl flex flex-col">
                <div class="flex items-center justify-between h-16 px-6 border-b border-white/10">
                    <div class="flex items-center space-x-2">
                        <span class="text-lg font-bold tracking-tight">STIZ</span>
                        <span class="bg-brand-red text-white text-xs font-bold px-2 py-0.5 rounded">ADMIN</span>
                    </div>
                    <button type="button" data-drawer-close
                        class="inline-flex items-center justify-center w-11 h-11 text-gray-300 hover:text-white"
                        aria-label="메뉴 닫기">
                        <span class="material-symbols-outlined text-2xl">close</span>
                    </button>
                </div>
                <nav class="flex-1 overflow-y-auto py-2">
                    <a href="admin-home.html" class="flex items-center min-h-[44px] px-6 py-3 text-gray-300 hover:text-white hover:bg-white/5">홈</a>
                    <a href="admin.html" class="flex items-center min-h-[44px] px-6 py-3 text-gray-300 hover:text-white hover:bg-white/5">전체 주문</a>
                    <a href="admin-design.html" data-admin-scope="all,design" class="flex items-center min-h-[44px] px-6 py-3 text-gray-300 hover:text-white hover:bg-white/5">디자인 파트</a>
                    <a href="admin-cs.html" data-admin-scope="all,cs" class="flex items-center min-h-[44px] px-6 py-3 text-gray-300 hover:text-white hover:bg-white/5">CS 파트</a>
                    <a href="admin-production.html" data-admin-scope="all,production" class="flex items-center min-h-[44px] px-6 py-3 text-gray-300 hover:text-white hover:bg-white/5">제작 파트</a>
                    <a href="admin-shipping.html" data-admin-scope="all,shipping" class="flex items-center min-h-[44px] px-6 py-3 text-gray-300 hover:text-white hover:bg-white/5">출고 파트</a>
                    <a href="admin-calendar.html" class="flex items-center min-h-[44px] px-6 py-3 text-gray-300 hover:text-white hover:bg-white/5">일정표</a>
                    <a href="admin-analytics.html" class="flex items-center min-h-[44px] px-6 py-3 text-gray-300 hover:text-white hover:bg-white/5">매출 분석</a>
                    <a href="admin-customers.html" class="flex items-center min-h-[44px] px-6 py-3 text-gray-300 hover:text-white hover:bg-white/5">고객 관리</a>
                    <a href="admin-catalog.html" class="flex items-center min-h-[44px] px-6 py-3 text-white font-medium bg-white/10" aria-current="page">상품설정</a>
                    <a href="admin-products.html" class="flex items-center min-h-[44px] px-6 py-3 text-gray-300 hover:text-white hover:bg-white/5">상품관리</a>
                    <a href="admin-faq.html" class="flex items-center min-h-[44px] px-6 py-3 text-gray-300 hover:text-white hover:bg-white/5">챗봇 FAQ</a>
                    <a href="index.html" class="flex items-center min-h-[44px] px-6 py-3 text-gray-300 hover:text-white hover:bg-white/5">쇼핑몰 보기</a>
                </nav>
            </aside>
        </div>
    </header>

    <!-- ========================================== -->
    <!-- 메인 콘텐츠 -->
    <!-- ========================================== -->
    <main class="container mx-auto px-6 py-8">

        <!-- 페이지 타이틀 + 저장 버튼 -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold">상품 카탈로그 설정</h1>
                <p id="last-updated" class="text-sm text-gray-400 mt-1"></p>
            </div>
            <button id="btn-save" onclick="saveCatalog()"
                class="bg-brand-red text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-red-700 transition-colors flex items-center gap-2">
                <span class="material-symbols-outlined text-lg">save</span>
                저장
            </button>
        </div>

        <!-- 탭 메뉴 (7탭: 종목/품목/등급/패키지/가격표/마감+할인/사이즈) -->
        <div class="flex border-b border-gray-200 mb-6 overflow-x-auto">
            <button class="tab-btn active" data-tab="sports" onclick="switchTab('sports')">
                <span class="material-symbols-outlined text-base align-middle mr-1">sports_basketball</span>종목
            </button>
            <button class="tab-btn" data-tab="categories" onclick="switchTab('categories')">
                <span class="material-symbols-outlined text-base align-middle mr-1">checkroom</span>품목
            </button>
            <button class="tab-btn" data-tab="grades" onclick="switchTab('grades')">
                <span class="material-symbols-outlined text-base align-middle mr-1">star</span>등급
            </button>
            <button class="tab-btn" data-tab="packages" onclick="switchTab('packages')">
                <span class="material-symbols-outlined text-base align-middle mr-1">inventory_2</span>패키지
            </button>
            <button class="tab-btn" data-tab="priceTable" onclick="switchTab('priceTable')">
                <span class="material-symbols-outlined text-base align-middle mr-1">payments</span>가격표
            </button>
            <button class="tab-btn" data-tab="finishDiscount" onclick="switchTab('finishDiscount')">
                <span class="material-symbols-outlined text-base align-middle mr-1">tune</span>마감/할인
            </button>
            <button class="tab-btn" data-tab="sizes" onclick="switchTab('sizes')">
                <span class="material-symbols-outlined text-base align-middle mr-1">straighten</span>사이즈
            </button>
        </div>

        <!-- CSV 가져오기 버튼 -->
        <div class="mb-6">
            <button onclick="openCsvImportModal()"
                class="flex items-center gap-2 text-sm font-semibold text-gray-600 hover:text-brand-red border border-gray-300 hover:border-brand-red rounded-lg px-4 py-2.5 transition-colors">
                <span class="material-symbols-outlined text-lg">upload_file</span>
                CSV에서 가져오기
            </button>
        </div>

        <!-- 탭 콘텐츠 영역 -->
        <div id="tab-content"></div>

        <!-- 견적 시뮬레이션 (새 가격표 참조 방식) -->
        <div class="sim-box mt-8">
            <h3 class="font-bold text-sm mb-3 flex items-center gap-1">
                <span class="material-symbols-outlined text-base">calculate</span>
                견적 시뮬레이션
            </h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                <label class="flex flex-col gap-1">
                    <span class="text-gray-500">종목</span>
                    <select id="sim-sport" onchange="onSimSportChange()" class="border rounded-lg px-3 py-2 text-sm"></select>
                </label>
                <label id="sim-grade-wrap" class="flex flex-col gap-1">
                    <span class="text-gray-500">등급</span>
                    <select id="sim-grade" onchange="onSimGradeChange()" class="border rounded-lg px-3 py-2 text-sm"></select>
                </label>
                <label id="sim-package-wrap" class="flex flex-col gap-1">
                    <span class="text-gray-500">패키지</span>
                    <select id="sim-package" onchange="updateSimulation()" class="border rounded-lg px-3 py-2 text-sm"></select>
                </label>
                <label id="sim-teamwear-wrap" class="flex flex-col gap-1 hidden">
                    <span class="text-gray-500">팀웨어 품목</span>
                    <select id="sim-teamwear-cat" onchange="updateSimulation()" class="border rounded-lg px-3 py-2 text-sm"></select>
                </label>
                <label class="flex flex-col gap-1">
                    <span class="text-gray-500">홈/어웨이</span>
                    <select id="sim-homeaway" onchange="updateSimulation()" class="border rounded-lg px-3 py-2 text-sm"></select>
                </label>
                <label class="flex flex-col gap-1">
                    <span class="text-gray-500">수량</span>
                    <input id="sim-qty" type="number" value="15" min="1" onchange="updateSimulation()" class="border rounded-lg px-3 py-2 text-sm">
                </label>
                <div class="col-span-2 flex items-end">
                    <div class="bg-white border border-blue-200 rounded-lg px-4 py-2 w-full text-center">
                        <span class="text-gray-500 text-xs">예상 견적</span>
                        <div id="sim-result" class="text-xl font-bold text-blue-600">-</div>
                        <div id="sim-detail" class="text-xs text-gray-400 mt-1"></div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- 모달 컨테이너 (JS에서 동적 생성) -->
    <div id="modal-container"></div>

    <!-- 공통 모듈 + 카탈로그 JS -->
    <script src="js/admin-common.js"></script>
    <script src="js/admin-catalog.js"></script>

</body>
</html>
