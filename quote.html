<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIZ Quick Quote - 3분 견적</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="css/style.css">
    <!-- html2canvas for image generation (CDN) -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>

<body class="bg-gray-50 font-sans text-gray-900">

    <!-- Header -->
    <header class="bg-black text-white h-16 flex items-center px-6 justify-between shadow-md">
        <a href="index.html" class="flex items-center space-x-2">
            <img src="images/logo_white.png" alt="STIZ" class="h-6 w-auto">
            <span class="font-bold text-sm tracking-widest border-l border-gray-600 pl-3">QUICK QUOTE</span>
        </a>
        <a href="custom.html" class="text-xs text-gray-400 hover:text-white">Design Lab &rarr;</a>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- Input Panel -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-bold mb-6 flex items-center">
                    <span class="w-8 h-8 bg-black text-white rounded-full flex items-center justify-center text-sm mr-3">1</span>
                    구성 선택 (Step 1)
                </h2>

                <!-- 1. Base Product -->
                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-2">베이스 유니폼 (Base Product)</label>
                    <select id="q-product" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-black transition-colors">
                        <option value="base_uniform" data-price="39000">Basic Team Kit (₩39,000)</option>
                        <option value="premium_kit" data-price="59000">Premium Pro Kit (₩59,000)</option>
                        <option value="training_set" data-price="89000">Warm-up Set (₩89,000)</option>
                    </select>
                </div>

                <!-- 2. Options -->
                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-2">추가 옵션 (Add-ons)</label>
                    <div class="space-y-3" id="q-options-container">
                        <!-- JS injected options -->
                        <div class="animate-pulse flex space-x-4">
                            <div class="flex-1 space-y-4 py-1">
                                <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                                <div class="space-y-2">
                                    <div class="h-4 bg-gray-200 rounded"></div>
                                    <div class="h-4 bg-gray-200 rounded w-5/6"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 3. Quantity -->
                <div class="mb-8">
                    <label class="block text-sm font-bold text-gray-700 mb-2">예상 수량 (Quantity)</label>
                    <div class="flex items-center">
                        <input type="number" id="q-quantity" value="20" min="1" class="w-24 border border-gray-300 rounded-lg px-4 py-3 font-bold text-center focus:outline-none focus:border-black">
                        <span class="ml-3 text-sm text-gray-500" id="q-discount-badge">
                            <!-- Discount Badge -->
                        </span>
                    </div>
                    <p class="text-xs text-gray-400 mt-2">* 20벌 이상 10%, 50벌 이상 15% 자동 할인</p>
                </div>
            </div>

            <!-- Result Panel (Receipt) -->
            <div class="flex flex-col">
                <div id="receipt-card" class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-black flex-1 relative overflow-hidden">
                    <!-- Watemark -->
                    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none opacity-[0.03]">
                        <img src="images/logo_black.png" class="w-64">
                    </div>

                    <div class="text-center mb-8 border-b border-gray-200 pb-6">
                        <h3 class="font-bold text-2xl tracking-tight">ESTIMATE</h3>
                        <p class="text-sm text-gray-500 mt-1" id="q-date">2024.01.01</p>
                    </div>

                    <div class="space-y-4 text-sm mb-8 flex-1">
                        <div class="flex justify-between">
                            <span class="text-gray-600">Base Item</span>
                            <span class="font-bold" id="r-base-price">₩0</span>
                        </div>
                        <div class="flex justify-between" id="r-options-list">
                            <!-- Options list -->
                        </div>
                        <div class="border-t border-gray-100 my-2"></div>
                        <div class="flex justify-between items-center text-gray-600">
                            <span>Quantity</span>
                            <span class="bg-gray-100 px-2 py-1 rounded text-xs font-bold" id="r-qty">20 ea</span>
                        </div>
                         <div class="flex justify-between text-brand-red">
                            <span>Discount</span>
                            <span id="r-discount">- ₩0</span>
                        </div>
                    </div>

                    <div class="border-t-2 border-black pt-4 mt-auto">
                        <div class="flex justify-between items-end">
                            <span class="font-bold text-lg">TOTAL</span>
                            <div class="text-right">
                                <p class="text-xs text-gray-400 mb-1">VAT Included</p>
                                <p class="text-3xl font-black text-black" id="r-total">₩0</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="mt-6 flex space-x-3">
                    <button onclick="downloadQuote()" class="flex-1 bg-white border border-black text-black py-3 rounded-lg font-bold hover:bg-gray-50 transition-colors flex items-center justify-center space-x-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                        <span>이미지로 저장</span>
                    </button>
                    <button onclick="alert('상담원에게 데이터가 전송되었습니다!')" class="flex-1 bg-black text-white py-3 rounded-lg font-bold hover:bg-gray-800 transition-colors shadow-lg">
                        상담 신청하기
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/product-data.js"></script>
    <script src="js/quote_wizard.js"></script>
</body>
</html>
