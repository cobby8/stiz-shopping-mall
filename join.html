<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="icon" type="image/png" href="images/favicon-32.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIZ - Sign Up</title>
    <!-- SEO 메타 태그 -->
    <meta name="description" content="STIZ 회원가입. 팀 유니폼 커스텀 디자인 서비스를 시작하세요.">
    <meta property="og:title" content="STIZ Sign Up">
    <meta property="og:description" content="STIZ 회원가입. 팀 유니폼 커스텀 디자인 서비스를 시작하세요.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/hero_bg.jpg">
    <link rel="canonical" href="https://stiz.co.kr/join.html">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="font-sans antialiased text-gray-900 bg-white">

    <header></header>
    <div class="h-20"></div>
    <div class="h-20"></div>

    <main class="container mx-auto px-6 py-20 max-w-md">
        <h1 class="text-3xl font-bold mb-2 text-center tracking-tight">회원가입</h1>
        <p class="text-center text-gray-500 mb-10 text-sm">STIZ 회원이 되어 특별 혜택을 받으세요.</p>

        <form class="space-y-4" onsubmit="event.preventDefault(); handleRegister();">
            <!-- 이름 -->
            <div>
                <input type="text" id="reg-name" placeholder="이름 *" required aria-label="이름"
                    class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black focus:ring-black outline-none transition-colors">
            </div>

            <!-- 이메일 -->
            <div>
                <input type="email" id="reg-email" placeholder="이메일 *" required aria-label="이메일 주소"
                    class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black focus:ring-black outline-none transition-colors">
            </div>

            <!-- 전화번호: 주문 시 연락처로 사용 (선택 입력) -->
            <div>
                <input type="tel" id="reg-phone" placeholder="전화번호" aria-label="전화번호"
                    pattern="[0-9\-]+"
                    class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black focus:ring-black outline-none transition-colors">
                <p class="text-xs text-gray-400 mt-1">선택 입력. 주문 시 연락처로 사용됩니다.</p>
            </div>

            <!-- 비밀번호 -->
            <div>
                <input type="password" id="reg-password" placeholder="비밀번호 *" required minlength="8" aria-label="비밀번호"
                    class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black focus:ring-black outline-none transition-colors">
                <p class="text-xs text-gray-400 mt-1">8자 이상 입력해주세요.</p>
            </div>

            <!-- 비밀번호 확인 -->
            <div>
                <input type="password" id="reg-password-confirm" placeholder="비밀번호 확인 *" required aria-label="비밀번호 확인"
                    class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black focus:ring-black outline-none transition-colors">
            </div>

            <!-- 에러 메시지 표시 영역 -->
            <p id="reg-error" class="text-xs text-red-500 hidden"></p>

            <!-- 약관 동의: 이용약관 + 개인정보처리방침 분리 -->
            <div class="pt-4 space-y-3">
                <label class="flex items-start">
                    <input type="checkbox" id="reg-agree-all"
                        class="mt-1 mr-2 rounded border-gray-300 text-black focus:ring-black"
                        onchange="toggleAllAgree(this.checked)">
                    <span class="text-sm font-bold text-gray-700">전체 동의</span>
                </label>
                <div class="border-t pt-3 space-y-2 pl-1">
                    <label class="flex items-start">
                        <input type="checkbox" id="reg-agree-terms" required
                            class="mt-1 mr-2 rounded border-gray-300 text-black focus:ring-black agree-item">
                        <span class="text-xs text-gray-500 leading-relaxed">
                            [필수] <a href="notice.html" class="underline font-bold">이용약관</a>에 동의합니다.
                        </span>
                    </label>
                    <label class="flex items-start">
                        <input type="checkbox" id="reg-agree-privacy" required
                            class="mt-1 mr-2 rounded border-gray-300 text-black focus:ring-black agree-item">
                        <span class="text-xs text-gray-500 leading-relaxed">
                            [필수] <a href="notice.html" class="underline font-bold">개인정보처리방침</a>에 동의합니다.
                        </span>
                    </label>
                    <label class="flex items-start">
                        <input type="checkbox" id="reg-agree-marketing"
                            class="mt-1 mr-2 rounded border-gray-300 text-black focus:ring-black agree-item">
                        <span class="text-xs text-gray-500 leading-relaxed">
                            [선택] 마케팅 정보 수신에 동의합니다.
                        </span>
                    </label>
                </div>
            </div>

            <button type="submit" id="reg-submit-btn"
                class="w-full bg-black text-white py-4 font-bold rounded hover:bg-gray-800 transition-colors uppercase mt-6">
                회원가입
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-gray-600">
            이미 계정이 있으신가요?
            <a href="login.html" class="text-black font-bold underline">로그인하기</a>
        </div>

    </main>

    <footer class="bg-black text-white" data-include="layout/footer.html"></footer>

    <script src="js/main.js" defer></script>
    <script src="js/header_render.js" defer></script>
    <script src="js/chatbot.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script>
        // 이미 로그인된 상태면 마이페이지로 이동
        if (isLoggedIn()) {
            location.href = 'myshop.html';
        }

        // "전체 동의" 체크박스 토글: 전체를 누르면 하위 항목 모두 체크/해제
        function toggleAllAgree(checked) {
            document.querySelectorAll('.agree-item').forEach(cb => {
                cb.checked = checked;
            });
        }

        // 하위 항목 변경 시 "전체 동의" 상태 자동 업데이트
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.agree-item').forEach(cb => {
                cb.addEventListener('change', () => {
                    const allChecked = [...document.querySelectorAll('.agree-item')].every(c => c.checked);
                    document.getElementById('reg-agree-all').checked = allChecked;
                });
            });
        });

        // 회원가입 처리 — async로 서버 API 호출
        async function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const phone = document.getElementById('reg-phone').value;
            const password = document.getElementById('reg-password').value;
            const passwordConfirm = document.getElementById('reg-password-confirm').value;
            const errEl = document.getElementById('reg-error');
            const submitBtn = document.getElementById('reg-submit-btn');

            // 에러 초기화
            errEl.classList.add('hidden');

            // 비밀번호 확인 일치 여부 (서버 전송 전에 체크)
            if (password !== passwordConfirm) {
                errEl.innerText = '비밀번호가 일치하지 않습니다.';
                errEl.classList.remove('hidden');
                return;
            }

            // 필수 약관 동의 확인
            if (!document.getElementById('reg-agree-terms').checked ||
                !document.getElementById('reg-agree-privacy').checked) {
                errEl.innerText = '필수 약관에 동의해주세요.';
                errEl.classList.remove('hidden');
                return;
            }

            // 버튼 비활성화 (중복 클릭 방지)
            submitBtn.disabled = true;
            submitBtn.innerText = '처리 중...';

            // 서버 API 호출 (auth.js의 register 함수)
            const result = await register({ name, email, password, phone });

            // 버튼 복구
            submitBtn.disabled = false;
            submitBtn.innerText = '회원가입';

            if (result.success) {
                alert('회원가입이 완료되었습니다! 로그인해주세요.');
                location.href = 'login.html';
            } else {
                errEl.innerText = result.error;
                errEl.classList.remove('hidden');
            }
        }
    </script>
</body>

</html>
