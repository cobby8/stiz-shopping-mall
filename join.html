<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us - STIZ</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="font-sans antialiased text-gray-900 bg-white">

    <header></header>
    <div class="h-20"></div>
    <div class="h-20"></div>

    <main class="container mx-auto px-6 py-20 max-w-md">
        <h1 class="text-3xl font-bold mb-2 text-center tracking-tight">CREATE ACCOUNT</h1>
        <p class="text-center text-gray-500 mb-10 text-sm">Join STIZ for exclusive offers and faster checkout.</p>

        <form class="space-y-4"
            onsubmit="event.preventDefault(); alert('Registration Mock: Success!'); location.href='login.html';">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" placeholder="First Name" required
                    class="border border-gray-300 rounded px-4 py-3 text-sm w-full focus:border-black focus:ring-black outline-none transition-colors">
                <input type="text" placeholder="Last Name" required
                    class="border border-gray-300 rounded px-4 py-3 text-sm w-full focus:border-black focus:ring-black outline-none transition-colors">
            </div>

            <input type="email" placeholder="Email" required
                class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black focus:ring-black outline-none transition-colors">

            <input type="password" placeholder="Password" required
                class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black focus:ring-black outline-none transition-colors">
            <p class="text-xs text-gray-400 mt-1">Must be at least 8 characters.</p>

            <div class="pt-4">
                <label class="flex items-start">
                    <input type="checkbox" required
                        class="mt-1 mr-2 rounded border-gray-300 text-black focus:ring-black">
                    <span class="text-xs text-gray-500 leading-relaxed">
                        I agree to STIZ's Privacy Policy and Terms of Use.
                    </span>
                </label>
            </div>

            <button type="submit"
                class="w-full bg-black text-white py-4 font-bold rounded hover:bg-gray-800 transition-colors uppercase mt-6">
                Create Account
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-gray-600">
            Already have an account?
            <a href="login.html" class="text-black font-bold underline">Sign In</a>
        </div>

    </main>

    <footer class="bg-black text-white" data-include="layout/footer.html"></footer>

    <script src="js/main.js"></script>
    <script src="js/header_render.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
