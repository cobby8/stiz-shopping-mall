<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIZ - Sign Up</title>
    <!-- SEO 메타 태그 -->
    <meta name="description" content="STIZ 회원가입. 팀 유니폼 커스텀 디자인 서비스를 시작하세요.">
    <meta property="og:title" content="STIZ Sign Up">
    <meta property="og:description" content="STIZ 회원가입. 팀 유니폼 커스텀 디자인 서비스를 시작하세요.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/hero_bg.jpg">
    <link rel="canonical" href="https://stiz.co.kr/join.html">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="font-sans antialiased text-gray-900 bg-white">

    <header></header>
    <div class="h-20"></div>
    <div class="h-20"></div>

    <main class="container mx-auto px-6 py-20 max-w-md">
        <h1 class="text-3xl font-bold mb-2 text-center tracking-tight">CREATE ACCOUNT</h1>
        <p class="text-center text-gray-500 mb-10 text-sm">Join STIZ for exclusive offers and faster checkout.</p>

        <form class="space-y-4" onsubmit="event.preventDefault(); handleRegister();">
            <div>
                <input type="text" id="reg-name" placeholder="Name (이름) *" required aria-label="이름"
                    class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black focus:ring-black outline-none transition-colors">
            </div>

            <div>
                <input type="email" id="reg-email" placeholder="Email *" required aria-label="이메일 주소"
                    class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black focus:ring-black outline-none transition-colors">
            </div>

            <div>
                <input type="password" id="reg-password" placeholder="Password *" required minlength="8" aria-label="비밀번호"
                    class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black focus:ring-black outline-none transition-colors">
                <p class="text-xs text-gray-400 mt-1">Must be at least 8 characters.</p>
            </div>

            <div>
                <input type="password" id="reg-password-confirm" placeholder="Confirm Password *" required aria-label="비밀번호 확인"
                    class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black focus:ring-black outline-none transition-colors">
            </div>

            <p id="reg-error" class="text-xs text-red-500 hidden"></p>

            <div class="pt-4">
                <label class="flex items-start">
                    <input type="checkbox" id="reg-agree" required
                        class="mt-1 mr-2 rounded border-gray-300 text-black focus:ring-black">
                    <span class="text-xs text-gray-500 leading-relaxed">
                        I agree to STIZ's <a href="notice.html" class="underline font-bold">Privacy Policy</a> and Terms of Use. *
                    </span>
                </label>
            </div>

            <button type="submit"
                class="w-full bg-black text-white py-4 font-bold rounded hover:bg-gray-800 transition-colors uppercase mt-6">
                Create Account
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-gray-600">
            Already have an account?
            <a href="login.html" class="text-black font-bold underline">Sign In</a>
        </div>

    </main>

    <footer class="bg-black text-white" data-include="layout/footer.html"></footer>

    <script src="js/main.js" defer></script>
    <script src="js/header_render.js" defer></script>
    <script src="js/chatbot.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script>
        // Redirect if already logged in
        if (isLoggedIn()) {
            location.href = 'myshop.html';
        }

        function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const passwordConfirm = document.getElementById('reg-password-confirm').value;
            const errEl = document.getElementById('reg-error');

            if (password !== passwordConfirm) {
                errEl.innerText = '비밀번호가 일치하지 않습니다.';
                errEl.classList.remove('hidden');
                return;
            }

            const result = register({ name, email, password });
            if (result.success) {
                alert('회원가입이 완료되었습니다! 로그인해주세요.');
                location.href = 'login.html';
            } else {
                errEl.innerText = result.error;
                errEl.classList.remove('hidden');
            }
        }
    </script>
</body>

</html>
