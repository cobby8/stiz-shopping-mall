<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail - STIZ</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="font-sans antialiased text-gray-900 bg-white">

    <!-- HEADER -->
    <header></header>
    <div class="h-20"></div>
    <div class="h-20"></div>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 lg:gap-20">

            <!-- Image Gallery (Left) -->
            <div class="space-y-4">
                <div class="w-full h-[600px] bg-gray-100 overflow-hidden rounded-lg">
                    <img id="main-image" src="" alt="Product Image" class="w-full h-full object-cover">
                </div>
                <div class="grid grid-cols-4 gap-4">
                    <!-- Thumbnails Mock -->
                    <div class="h-32 bg-gray-100 rounded cursor-pointer ring-2 ring-black">
                        <img id="thumb-1" src="" class="w-full h-full object-cover rounded opacity-100">
                    </div>
                    <div class="h-32 bg-gray-100 rounded cursor-pointer hover:opacity-75 transition-opacity">
                        <img src="https://placehold.co/200x200?text=Side" class="w-full h-full object-cover rounded">
                    </div>
                </div>
            </div>

            <!-- Product Info (Right) -->
            <!-- Product Info (Right) - Sticky -->
            <div class="flex flex-col md:sticky md:top-24 self-start h-auto">
                <div class="mb-6 border-b border-gray-100 pb-6">
                    <p id="product-category" class="text-xs text-gray-400 uppercase font-bold tracking-widest mb-2">
                        Category</p>
                    <h1 id="product-name" class="text-3xl font-bold mb-2 tracking-tight">Product Name</h1>
                    <div class="flex items-end justify-between">
                        <p id="product-price" class="text-2xl font-bold">₩ 0</p>
                        <!-- Auto Quote Trigger -->
                        <button onclick="location.href='quote.html'"
                            class="text-xs text-blue-600 font-bold hover:underline flex items-center">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z">
                                </path>
                            </svg>
                            Get Team Estimate (Wizard)
                        </button>
                    </div>
                </div>

                <p id="product-desc" class="text-sm text-gray-600 leading-relaxed mb-8">
                    Loading description...
                </p>

                <!-- Options -->
                <div class="space-y-6 mb-8">
                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="font-bold text-xs uppercase text-gray-500">Select Size</label>
                            <!-- Size Guide Link will be handled by size_recommender.js injection -->
                        </div>
                        <div class="grid grid-cols-5 gap-2">
                            <button
                                class="border border-gray-200 rounded py-2 text-sm font-medium hover:border-black hover:bg-black hover:text-white transition-all">S</button>
                            <button
                                class="border border-gray-200 rounded py-2 text-sm font-medium hover:border-black hover:bg-black hover:text-white transition-all">M</button>
                            <button
                                class="border border-gray-200 rounded py-2 text-sm font-medium hover:border-black hover:bg-black hover:text-white transition-all">L</button>
                            <button
                                class="border border-gray-200 rounded py-2 text-sm font-medium hover:border-black hover:bg-black hover:text-white transition-all">XL</button>
                            <button
                                class="border border-gray-200 rounded py-2 text-sm font-medium hover:border-black hover:bg-black hover:text-white transition-all">2XL</button>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex space-x-3 mb-4">
                    <div class="w-24">
                        <input type="number" id="buy-qty" value="1" min="1"
                            class="w-full border border-gray-300 rounded py-3 text-center font-bold focus:outline-none focus:border-black">
                    </div>
                    <button id="add-to-cart-btn"
                        class="flex-1 bg-black text-white font-bold py-3 rounded hover:bg-gray-800 transition-colors uppercase tracking-widest text-sm">
                        Add to Cart
                    </button>
                </div>

                <button
                    class="w-full border border-black py-3 rounded font-bold text-sm uppercase tracking-widest hover:bg-gray-50 mb-8">
                    Buy Now
                </button>

                <!-- Shipping Info -->
                <div class="bg-gray-50 p-4 rounded text-xs text-gray-600 space-y-2">
                    <div class="flex items-center"><span class="font-bold w-20">Delivery</span> <span>Free shipping on
                            orders over ₩50,000</span></div>
                    <div class="flex items-center"><span class="font-bold w-20">Returns</span> <span>7 days free return
                            policy</span></div>
                </div>
            </div>
        </div>

        <!-- Quote Modal (Hidden) - OLD MODAL REMOVED/DEPRECATED in favor of Wizard -->

    </main>

    <!-- FOOTER -->
    <footer class="bg-black text-white" data-include="layout/footer.html"></footer>

    <!-- Scripts -->
    <script src="js/product-data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/size_recommender.js"></script>>
    <script>
        // Current Product Price (Global for Modal)
        let currentPrice = 0;

        function openQuoteModal() {
            const product = getProductById(new URLSearchParams(window.location.search).get('id') || 1);
            if (product) {
                currentPrice = product.price;
                document.getElementById('modal-price').innerText = '₩' + currentPrice.toLocaleString();
                calculateQuote();
                document.getElementById('quote-modal').classList.remove('hidden');
            }
        }

        function closeQuoteModal() {
            document.getElementById('quote-modal').classList.add('hidden');
        }

        function calculateQuote() {
            const qty = parseInt(document.getElementById('quote-qty').value) || 0;
            let unitPrice = currentPrice;

            // Simple Discount Logic
            if (qty >= 50) unitPrice *= 0.85; // 15% off
            else if (qty >= 20) unitPrice *= 0.90; // 10% off
            else if (qty >= 10) unitPrice *= 0.95; // 5% off

            const total = Math.floor(unitPrice * qty);
            document.getElementById('quote-total').innerText = '₩' + total.toLocaleString();
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Get ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            // Default to 1 if no ID 
            const productId = urlParams.get('id') || 1;

            const product = getProductById(productId);

            if (product) {
                document.getElementById('product-category').innerText = product.category;
                document.getElementById('product-name').innerText = product.name;
                document.getElementById('product-price').innerText = '₩ ' + product.price.toLocaleString();
                document.getElementById('product-desc').innerText = product.description;
                document.getElementById('main-image').src = product.image;
                document.getElementById('thumb-1').src = product.image;
                document.title = `${product.name} | STIZ Shop`;
            } else {
                alert('Product not found');
                location.href = 'list.html';
            }

            // Add to Cart Logic
            document.getElementById('add-to-cart-btn').addEventListener('click', () => {
                if (!product) return;
                const qty = document.getElementById('buy-qty').value;
                // Simple sizing for demo (In real app, get selected size)
                const size = 'L';

                addToCart({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    image: product.image,
                    size: size,
                    qty: qty
                });
            });
        });
    </script>
</body>

</html>
