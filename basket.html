<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - STIZ</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="font-sans antialiased text-gray-900 bg-white">

    <!-- HEADER -->
    <header></header>
    <div class="h-20"></div>
    <div class="h-20"></div>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-12">
        <h1 class="text-3xl font-bold mb-10 tracking-tight">SHOPPING CART</h1>

        <div class="flex flex-col lg:flex-row gap-12">

            <!-- Cart Items List -->
            <div class="flex-1">
                <div class="border-t border-black" id="cart-container">
                    <!-- Items injected via JS -->
                    <div class="py-12 text-center text-gray-500" id="empty-msg">
                        Your cart is empty.
                        <br><br>
                        <a href="list.html" class="text-black font-bold underline">Continue Shopping</a>
                    </div>
                </div>
            </div>

            <!-- Summary Sidebar -->
            <div class="w-full lg:w-96">
                <div class="bg-gray-50 p-8 rounded-lg sticky top-24">
                    <h2 class="font-bold text-lg mb-6">Order Summary</h2>

                    <div class="flex justify-between mb-4 text-sm">
                        <span class="text-gray-600">Subtotal</span>
                        <span class="font-bold" id="subtotal">₩ 0</span>
                    </div>
                    <div class="flex justify-between mb-4 text-sm">
                        <span class="text-gray-600">Shipping</span>
                        <span class="text-gray-600" id="shipping-cost">Calculated at checkout</span>
                    </div>

                    <div class="border-t border-gray-200 my-6 pt-6 flex justify-between items-center">
                        <span class="font-bold text-lg">Total</span>
                        <span class="font-bold text-xl text-brand-red" id="total">₩ 0</span>
                    </div>

                    <button onclick="location.href='order.html'" id="checkout-btn"
                        class="w-full bg-black text-white py-4 font-bold rounded hover:bg-gray-800 transition-colors uppercase disabled:bg-gray-300 disabled:cursor-not-allowed">
                        Proceed to Checkout
                    </button>

                    <p class="text-xs text-gray-400 mt-4 text-center">
                        Prices include tax. Shipping calculated at checkout.
                    </p>
                </div>
            </div>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="bg-black text-white" data-include="layout/footer.html"></footer>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="js/header_render.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="js/cart.js"></script>
    <script>
        // Render Cart UI
        function renderCart() {
            const cart = getCart();
            const container = document.getElementById('cart-container');
            const emptyMsg = document.getElementById('empty-msg');
            const checkoutBtn = document.getElementById('checkout-btn');

            // Clear current list (except header/empty msg handled below)
            container.innerHTML = '';

            if (cart.length === 0) {
                container.appendChild(emptyMsg);
                emptyMsg.style.display = 'block';

                document.getElementById('subtotal').innerText = '0';
                document.getElementById('total').innerText = '0';
                checkoutBtn.disabled = true;
                return;
            }

            emptyMsg.style.display = 'none';
            checkoutBtn.disabled = false;

            cart.forEach((item, index) => {
                const el = document.createElement('div');
                el.className = 'flex flex-col sm:flex-row items-center gap-6 py-6 border-b border-gray-100';
                el.innerHTML = `
                    <div class="w-24 h-24 bg-gray-100 flex-shrink-0">
                        <img src="${item.image}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 text-center sm:text-left">
                        <h3 class="font-bold text-sm mb-1">${item.name}</h3>
                        <p class="text-xs text-gray-500 mb-2">Size: ${item.size || 'Free'} / Qty: ${item.qty}</p>
                        <button onclick="removeFromCart(${index})" class="text-xs text-gray-400 underline hover:text-red-500">Remove</button>
                    </div>
                    <div class="font-bold text-sm">
                        ₩ ${(item.price * item.qty).toLocaleString()}
                    </div>
                `;
                container.appendChild(el);
            });

            // Update Summary
            const total = getCartTotal();
            const formatted = '₩ ' + total.toLocaleString();
            document.getElementById('subtotal').innerText = formatted;
            document.getElementById('total').innerText = formatted;
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
        });
    </script>
</body>

</html>
