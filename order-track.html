<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIZ - 주문 진행상황 조회</title>
    <!-- SEO 메타 태그 -->
    <meta name="description" content="STIZ 주문 진행상황을 실시간으로 확인하세요. 시안, 제작, 배송 단계를 한눈에.">
    <meta property="og:title" content="STIZ 주문 조회">
    <meta property="og:description" content="주문번호로 진행상황을 확인하세요.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/hero_bg.jpg">
    <link rel="canonical" href="https://stiz.co.kr/order-track.html">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Pretendard 폰트 -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <!-- Material Symbols (아이콘) -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <link rel="stylesheet" href="css/style.css">

    <style>
        /* 프로그레스 바 커스텀 스타일 */
        .progress-step {
            position: relative;
            flex: 1;
            text-align: center;
        }

        /* 단계 사이 연결선 */
        .progress-step:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 50%;
            width: 100%;
            height: 3px;
            background: #e5e7eb;
            z-index: 0;
        }

        /* 완료된 단계의 연결선은 검정색 */
        .progress-step.completed:not(:last-child)::after {
            background: #111111;
        }

        /* 진행중인 단계의 연결선은 절반만 */
        .progress-step.active:not(:last-child)::after {
            background: linear-gradient(to right, #111111 50%, #e5e7eb 50%);
        }

        /* 단계 원형 아이콘 */
        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        /* 타임라인 세로선 */
        .timeline-item {
            position: relative;
            padding-left: 32px;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 24px;
            bottom: -16px;
            width: 2px;
            background: #e5e7eb;
        }
        .timeline-item:last-child::before {
            display: none;
        }
        .timeline-dot {
            position: absolute;
            left: 0;
            top: 6px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 3px solid #111111;
            background: white;
        }
        .timeline-item:first-child .timeline-dot {
            background: #111111;
        }
    </style>
</head>

<body class="font-sans antialiased text-gray-900 bg-white">

    <!-- HEADER -->
    <header></header>
    <div class="h-20"></div>
    <div class="h-20"></div>

    <main class="container mx-auto px-6 py-12 max-w-2xl">

        <!-- 페이지 제목 -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold mb-2">주문 진행상황 조회</h1>
            <p class="text-gray-500 text-sm">주문번호를 입력하면 현재 진행 단계를 확인할 수 있습니다.</p>
        </div>

        <!-- 검색 폼: 주문번호를 입력받아 API로 조회 -->
        <div class="bg-gray-50 border border-gray-200 rounded-lg p-6 mb-8">
            <label for="order-number-input" class="block text-sm font-bold mb-2">주문번호</label>
            <div class="flex gap-3">
                <input type="text" id="order-number-input"
                    placeholder="예: ORD-20260326-001"
                    class="flex-1 border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent"
                    autocomplete="off">
                <button onclick="trackOrder()"
                    class="bg-black text-white px-6 py-3 rounded-lg text-sm font-bold hover:bg-gray-800 transition flex-shrink-0">
                    조회
                </button>
            </div>
            <!-- 에러 메시지 영역 -->
            <p id="search-error" class="text-red-500 text-xs mt-2 hidden"></p>
        </div>

        <!-- 로딩 스피너 (조회 중 표시) -->
        <div id="loading" class="hidden text-center py-12">
            <div class="inline-block w-8 h-8 border-3 border-gray-300 border-t-black rounded-full animate-spin"></div>
            <p class="text-gray-400 text-sm mt-3">조회 중...</p>
        </div>

        <!-- 조회 결과 영역 (기본 숨김, 조회 성공 시 표시) -->
        <div id="result-area" class="hidden space-y-8">

            <!-- 주문 기본 정보 카드 -->
            <div class="bg-white border border-gray-200 rounded-lg p-6">
                <div class="flex items-start justify-between mb-4">
                    <div>
                        <span class="text-xs text-gray-400" id="result-order-number"></span>
                        <h2 class="text-lg font-bold mt-1" id="result-team-name"></h2>
                    </div>
                    <!-- 현재 상태 배지 -->
                    <span id="result-status-badge"
                        class="inline-block px-3 py-1 text-xs font-bold rounded-full"></span>
                </div>
                <!-- 주문 아이템 요약 -->
                <div id="result-items" class="text-sm text-gray-600"></div>
            </div>

            <!-- 4단계 프로그레스 바 (시안 -> 제작 -> 배송 -> 완료) -->
            <div class="bg-white border border-gray-200 rounded-lg p-6">
                <h3 class="text-sm font-bold mb-6 text-gray-500">진행 상태</h3>
                <div class="flex" id="progress-bar">
                    <!-- JS에서 동적 생성 -->
                </div>
            </div>

            <!-- 상세 이력 타임라인 -->
            <div class="bg-white border border-gray-200 rounded-lg p-6">
                <h3 class="text-sm font-bold mb-6 text-gray-500">상세 이력</h3>
                <div id="timeline" class="space-y-4">
                    <!-- JS에서 동적 생성 -->
                </div>
            </div>

            <!-- 배송 정보 (송장번호가 있을 때만 표시) -->
            <div id="shipping-info" class="hidden bg-white border border-gray-200 rounded-lg p-6">
                <h3 class="text-sm font-bold mb-4 text-gray-500">배송 정보</h3>
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm"><span class="text-gray-400">택배사:</span> <span id="result-carrier" class="font-medium"></span></p>
                        <p class="text-sm mt-1"><span class="text-gray-400">송장번호:</span> <span id="result-tracking" class="font-medium"></span></p>
                    </div>
                    <a id="tracking-link" href="#" target="_blank"
                        class="bg-black text-white px-4 py-2 rounded text-xs font-bold hover:bg-gray-800 transition">
                        <span class="material-symbols-outlined text-sm align-middle mr-1">local_shipping</span>
                        배송추적
                    </a>
                </div>
            </div>

            <!-- 희망 납기일 -->
            <div id="desired-date-info" class="hidden bg-gray-50 border border-gray-200 rounded-lg p-4 text-center">
                <span class="text-gray-400 text-xs">희망 납기일</span>
                <p class="font-bold text-lg mt-1" id="result-desired-date"></p>
            </div>

        </div>

        <!-- 조회 실패 시 표시 -->
        <div id="not-found" class="hidden text-center py-16">
            <span class="material-symbols-outlined text-6xl text-gray-300 mb-4">search_off</span>
            <p class="text-gray-500 text-sm">해당 주문번호를 찾을 수 없습니다.</p>
            <p class="text-gray-400 text-xs mt-1">주문번호를 다시 확인해주세요.</p>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="bg-black text-white" data-include="layout/footer.html"></footer>

    <!-- 스크립트: 공통 모듈 먼저 로드, 페이지 전용 JS는 마지막 -->
    <script src="js/main.js" defer></script>
    <script src="js/header_render.js" defer></script>
    <script src="js/chatbot.js" defer></script>
    <script src="js/cart.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/order-track.js" defer></script>
</body>

</html>
