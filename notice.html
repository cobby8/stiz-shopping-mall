<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notice - STIZ</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="font-sans antialiased text-gray-900 bg-white">

    <header></header>
    <div class="h-20"></div>
    <div class="h-20"></div>

    <main class="container mx-auto px-6 py-12 max-w-5xl">
        <!-- 모바일: 세로 배치 + gap으로 겹침 방지 / md 이상: 가로 배치 -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-8 border-b-2 border-black pb-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight mb-2">NOTICE</h1>
                <p class="text-gray-500 text-sm">STIZ News & Announcements</p>
            </div>
            <div class="flex space-x-2">
                <input type="text" placeholder="Search..." class="border border-gray-300 rounded px-3 py-2 text-sm">
            </div>
        </div>

        <!-- Instagram Section -->
        <div class="mb-12">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center space-x-4">
                    <div
                        class="w-16 h-16 rounded-full bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-500 p-[2px]">
                        <div class="w-full h-full bg-white rounded-full p-[2px]">
                            <img src="https://images.unsplash.com/photo-1546519638-68e109498ee2?q=80&w=1790&auto=format&fit=crop"
                                class="w-full h-full rounded-full object-cover">
                        </div>
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold">official_stiz</h2>
                        <a href="https://instagram.com" target="_blank" class="text-sm text-blue-500 font-medium">Follow
                            on Instagram</a>
                    </div>
                </div>
                <!-- Embed Widget Placeholder -->
            </div>

            <!-- Instagram Grid Mock (Simulating Feed) -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                <!-- Feed 1 -->
                <div class="aspect-square relative group overflow-hidden bg-gray-100 cursor-pointer">
                    <img src="https://images.unsplash.com/photo-1541534741688-6078c6bfb5c5?q=80&w=1000&auto=format&fit=crop"
                        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    <div
                        class="absolute inset-0 bg-black/30 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-white space-x-4">
                        <span class="flex items-center"><svg class="w-5 h-5 mr-1" fill="currentColor"
                                viewBox="0 0 24 24">
                                <path
                                    d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                            </svg> 124</span>
                    </div>
                </div>
                <!-- Feed 2 -->
                <div class="aspect-square relative group overflow-hidden bg-gray-100 cursor-pointer">
                    <img src="https://images.unsplash.com/photo-1517466787929-bc90951d0974?q=80&w=1000&auto=format&fit=crop"
                        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    <div
                        class="absolute inset-0 bg-black/30 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-white space-x-4">
                        <span class="flex items-center"><svg class="w-5 h-5 mr-1" fill="currentColor"
                                viewBox="0 0 24 24">
                                <path
                                    d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                            </svg> 89</span>
                    </div>
                </div>
                <!-- Feed 3 -->
                <div class="aspect-square relative group overflow-hidden bg-gray-100 cursor-pointer">
                    <img src="https://images.unsplash.com/photo-1599058945522-28d584b6f0ff?q=80&w=1000&auto=format&fit=crop"
                        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    <div
                        class="absolute inset-0 bg-black/30 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-white space-x-4">
                        <span class="flex items-center"><svg class="w-5 h-5 mr-1" fill="currentColor"
                                viewBox="0 0 24 24">
                                <path
                                    d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                            </svg> 201</span>
                    </div>
                </div>
                <!-- Feed 4 (Pinned/Notice) -->
                <div
                    class="aspect-square relative group overflow-hidden bg-gray-100 cursor-pointer border-2 border-red-500">
                    <div class="absolute top-2 right-2 bg-red-500 text-white text-[10px] px-2 py-0.5 font-bold z-10">
                        NOTICE</div>
                    <img src="https://images.unsplash.com/photo-1551958219-acbc608c6377?q=80&w=1000&auto=format&fit=crop"
                        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    <div
                        class="absolute inset-0 bg-black/30 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-white space-x-4">
                        <span class="flex items-center"><svg class="w-5 h-5 mr-1" fill="currentColor"
                                viewBox="0 0 24 24">
                                <path
                                    d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                            </svg> 542</span>
                    </div>
                </div>
            </div>

            <div class="mt-8 text-center text-gray-500 text-sm">
                <p>Follow <span class="font-bold text-black">@official_stiz</span> to catch up with our latest drops.
                </p>
                <div class="mt-4 p-4 bg-gray-50 rounded border border-gray-200 inline-block text-xs text-gray-400">
                    * Actual Instagram Feed Embed Script (e.g. SnapWidget, Elfsight) will be placed here. <br>
                    * Currently using Mock Grid for demo purposes.
                </div>
            </div>
        </div>

    </main>

    <footer class="bg-black text-white" data-include="layout/footer.html"></footer>

    <script src="js/main.js"></script>
    <script src="js/header_render.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
