<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - STIZ</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="font-sans antialiased text-gray-900 bg-white flex flex-col min-h-screen">

    <!-- HEADER -->
    <header></header>
    <div class="h-20"></div>
    <div class="h-20"></div>

    <main class="flex-1 container mx-auto px-6 py-12">

        <div class="max-w-2xl mx-auto text-center">
            <!-- Success Icon -->
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-8 mx-auto text-green-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>

            <h1 class="text-4xl font-bold mb-4">Thank you for your order!</h1>
            <p class="text-gray-500 mb-8" id="confirm-email-msg">
                Your order has been received and is being processed.
            </p>

            <!-- Order Number -->
            <div class="bg-gray-50 p-6 rounded-lg border border-gray-200 w-full mb-8">
                <h3 class="text-sm font-bold text-gray-500 uppercase mb-2">Order Number</h3>
                <p class="text-2xl font-mono tracking-widest" id="result-order-number">#STIZ-0000-0000</p>
            </div>

            <!-- Order Details -->
            <div class="bg-white border border-gray-200 rounded-lg text-left mb-8">
                <div class="p-6 border-b border-gray-100">
                    <h3 class="font-bold text-sm mb-4">Order Items</h3>
                    <div id="result-items" class="space-y-3">
                        <!-- JS injected -->
                    </div>
                </div>

                <div class="p-6 border-b border-gray-100">
                    <h3 class="font-bold text-sm mb-3">Shipping Address</h3>
                    <p class="text-sm text-gray-600" id="result-address">-</p>
                </div>

                <div class="p-6">
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-gray-500">Subtotal</span>
                        <span class="font-bold" id="result-subtotal">₩ 0</span>
                    </div>
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-gray-500">Shipping</span>
                        <span id="result-shipping">₩ 0</span>
                    </div>
                    <div class="flex justify-between text-lg font-bold border-t border-gray-200 pt-3 mt-3">
                        <span>Total</span>
                        <span class="text-brand-red" id="result-total">₩ 0</span>
                    </div>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button onclick="location.href='list.html'"
                    class="bg-black text-white px-8 py-3 rounded font-bold hover:bg-gray-800 transition-colors uppercase">
                    Continue Shopping
                </button>
                <button onclick="location.href='index.html'"
                    class="border border-black px-8 py-3 rounded font-bold hover:bg-black hover:text-white transition-colors uppercase">
                    Back to Home
                </button>
            </div>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="bg-black text-white w-full" data-include="layout/footer.html"></footer>

    <script src="js/product-data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/header_render.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const orderJson = localStorage.getItem('stiz_last_order');
            if (!orderJson) {
                document.getElementById('result-order-number').innerText = '#N/A';
                return;
            }

            const order = JSON.parse(orderJson);

            // Order number
            document.getElementById('result-order-number').innerText = '#' + order.orderNumber;

            // Email message
            if (order.customer && order.customer.email) {
                document.getElementById('confirm-email-msg').innerHTML =
                    `Your order has been received and is being processed. A confirmation will be sent to <span class="text-black font-bold">${order.customer.email}</span>.`;
            }

            // Items
            const itemsContainer = document.getElementById('result-items');
            if (order.items) {
                order.items.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'flex items-center gap-4';
                    el.innerHTML = `
                        <div class="w-12 h-12 bg-gray-100 rounded overflow-hidden flex-shrink-0">
                            <img src="${item.image}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold truncate">${item.name}</p>
                            <p class="text-xs text-gray-500">${item.size || 'Free'} / Qty: ${item.qty}</p>
                        </div>
                        <span class="text-sm font-medium flex-shrink-0">₩${(item.price * item.qty).toLocaleString()}</span>
                    `;
                    itemsContainer.appendChild(el);
                });
            }

            // Address
            if (order.shipping) {
                const addr = `[${order.shipping.postcode}] ${order.shipping.address} ${order.shipping.addressDetail || ''}`;
                document.getElementById('result-address').innerText = addr.trim();
            }

            // Totals
            document.getElementById('result-subtotal').innerText = '₩ ' + (order.subtotal || 0).toLocaleString();
            document.getElementById('result-shipping').innerText = order.shippingCost === 0 ? 'FREE' : '₩ ' + (order.shippingCost || 0).toLocaleString();
            document.getElementById('result-total').innerText = '₩ ' + (order.total || 0).toLocaleString();
        });
    </script>
</body>

</html>
