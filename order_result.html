<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - STIZ</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#111111',
                            red: '#E63946',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="font-sans antialiased text-gray-900 bg-white flex flex-col min-h-screen">

    <header class="fixed w-full z-50 bg-white text-black border-b border-gray-100" data-include="layout/header.html">
    </header>
    <div class="h-20"></div>

    <main class="flex-1 flex flex-col items-center justify-center container mx-auto px-6 text-center">

        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-8 text-green-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <h1 class="text-4xl font-bold mb-4">Thank you for your order!</h1>
        <p class="text-gray-500 max-w-md mx-auto mb-8">
            Your order has been received and is being processed. You will receive an email confirmation shortly at <span
                class="text-black font-bold">customer@example.com</span>.
        </p>

        <div class="bg-gray-50 p-6 rounded-lg border border-gray-200 w-full max-w-md mb-8">
            <h3 class="text-sm font-bold text-gray-500 uppercase mb-2">Order Number</h3>
            <p class="text-2xl font-mono tracking-widest">#STIZ-2025-001</p>
        </div>

        <div class="space-x-4">
            <button onclick="location.href='list.html'"
                class="bg-black text-white px-8 py-3 rounded font-bold hover:bg-gray-800 transition-colors uppercase">
                Continue Shopping
            </button>
            <button onclick="alert('Shared!')"
                class="border border-black px-8 py-3 rounded font-bold hover:bg-black hover:text-white transition-colors uppercase">
                Share
            </button>
        </div>

    </main>

    <footer class="bg-black text-white w-full" data-include="layout/footer.html"></footer>

    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
</body>

</html>
