<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIZ - 3D Design Lab</title>
    <!-- SEO 메타 태그 -->
    <meta name="description" content="3D 시뮬레이터로 유니폼 착용 모습을 미리 확인하세요.">
    <meta property="og:title" content="STIZ 3D Design Lab">
    <meta property="og:description" content="3D 시뮬레이터로 유니폼 착용 모습을 미리 확인하세요.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/hero_bg.jpg">
    <link rel="canonical" href="https://stiz.co.kr/custom_3d.html">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body {
            font-family: "Pretendard", sans-serif;
        }

        .chat-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .chat-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 2px;
        }

        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes typing {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 h-16 flex-none flex items-center justify-between px-6 z-10">
        <div class="flex items-center space-x-4">
            <a href="custom.html" class="flex items-center text-gray-500 hover:text-black transition-colors">
                <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                <span class="text-sm font-medium">Back</span>
            </a>
            <div class="h-4 w-px bg-gray-300"></div>
            <div class="flex items-center space-x-2">
                <span class="text-lg font-bold tracking-tight text-gray-900">STIZ AI LAB</span>
                <span
                    class="px-2 py-0.5 rounded-full bg-gradient-to-r from-indigo-500 to-purple-600 text-[10px] font-bold text-white uppercase tracking-wider">Nano
                    Banana Engine</span>
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <div
                class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-md text-xs font-bold border border-indigo-100 flex items-center">
                <svg class="w-3 h-3 mr-1.5" fill="currentColor" viewBox="0 0 20 20">
                    <path
                        d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z">
                    </path>
                </svg>
                Credits: <span id="credit-count" class="ml-1">3</span>/3
            </div>
        </div>
    </header>

    <!-- Main Content (Flex Row) -->
    <!-- Main Content (Flex Row) -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">

        <!-- Left: Chat Interface (Width 360px) -->
        <aside
            class="w-full md:w-[380px] flex flex-col bg-white border-b md:border-b-0 md:border-r border-gray-200 z-20 shadow-lg md:shadow-none order-2 md:order-1 h-[45%] md:h-auto">
            <!-- Chat Header -->
            <div class="p-3 md:p-4 border-b border-gray-100 bg-gray-50/50">
                <div class="flex items-center space-x-3">
                    <div
                        class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-indigo-600 flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                        <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z">
                            </path>
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-sm font-bold text-gray-900">AI Design Assistant</h2>
                        <p class="text-[10px] md:text-xs text-green-600 font-medium flex items-center">
                            <span class="w-1.5 h-1.5 rounded-full bg-green-500 mr-1.5"></span>
                            Online & Ready
                        </p>
                    </div>
                </div>
            </div>

            <!-- Messages Area -->
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 chat-scroll bg-white">
                <!-- Welcome -->
                <div class="flex items-start">
                    <div class="flex-shrink-0 mr-3">
                        <div
                            class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 text-xs font-bold">
                            AI</div>
                    </div>
                    <div
                        class="bg-gray-100 rounded-2xl rounded-tl-none px-4 py-3 text-sm text-gray-700 max-w-[90%] leading-relaxed shadow-sm">
                        Hello! Describe the soccer kit. <br class="md:hidden">
                        <span class="text-xs text-gray-500 mt-2 block">Try: "Modern neon pink kit" or "Classic vertical
                            stripes"</span>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 border-t border-gray-100 bg-white">
                <div class="relative shadow-sm">
                    <input type="text" id="chat-input"
                        class="w-full pl-4 pr-12 py-3 md:py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all"
                        placeholder="Type your prompt here...">
                    <button id="send-btn"
                        class="absolute right-2 top-2 p-1.5 bg-black text-white rounded-lg hover:bg-gray-800 transition-colors shadow-md">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                        </svg>
                    </button>
                </div>
                <p class="text-[10px] text-gray-400 mt-2 text-center">One generation costs 1 credit.
                </p>
            </div>
        </aside>

        <!-- Right: 3D Visualization (Flex 1) -->
        <section
            class="w-full md:flex-1 bg-gray-900 relative flex items-center justify-center overflow-hidden order-1 md:order-2 h-[55%] md:h-auto">
            <!-- Grid Background -->
            <div class="absolute inset-0 opacity-10"
                style="background-image: linear-gradient(#333 1px, transparent 1px), linear-gradient(90deg, #333 1px, transparent 1px); background-size: 40px 40px;">
            </div>

            <!-- Toolbar -->
            <div class="absolute top-4 right-4 md:top-6 md:right-6 flex space-x-2 z-10">
                <button class="p-2 bg-white/10 backdrop-blur rounded-lg text-white hover:bg-white/20 transition-colors"
                    title="Toggle Grid">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <button class="p-2 bg-white/10 backdrop-blur rounded-lg text-white hover:bg-white/20 transition-colors"
                    title="Download Image">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                </button>
            </div>

            <!-- Visualization Content -->
            <div id="viewer-container" class="relative z-0 w-full h-full flex items-center justify-center p-8 md:p-12">

                <!-- Placeholder / Loading State -->
                <div id="viewer-placeholder" class="text-center">
                    <div class="relative w-20 h-20 md:w-24 md:h-24 mx-auto mb-4 md:mb-6">
                        <div class="absolute inset-0 bg-indigo-500 rounded-full opacity-20 animate-ping"></div>
                        <div
                            class="relative w-full h-full bg-gray-800 rounded-full flex items-center justify-center border border-gray-700 shadow-2xl">
                            <svg class="w-10 h-10 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z">
                                </path>
                            </svg>
                        </div>
                    </div>
                    <h3 class="text-lg md:text-xl font-light text-white mb-2">Ready to Design</h3>
                    <p class="text-gray-500 font-mono text-xs md:text-sm">Enter a prompt to generate.</p>
                </div>

                <!-- Generated Image -->
                <img id="generated-image" src="" alt="3D Design"
                    class="hidden max-h-full max-w-full object-contain filter drop-shadow-[0_20px_50px_rgba(0,0,0,0.5)] transform transition-all duration-700 opacity-0 translate-y-4">

                <!-- Prompt Overlay -->
                <div id="prompt-overlay"
                    class="absolute bottom-8 left-1/2 transform -translate-x-1/2 bg-black/50 backdrop-blur-md px-6 py-3 rounded-full border border-white/10 text-center opacity-0 transition-opacity duration-500 w-3/4 md:w-auto">
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-0.5">Prompt</p>
                    <p id="prompt-text" class="text-xs md:text-sm font-medium text-white italic truncate">"..."</p>
                </div>

            </div>
        </section>
    </main>
    <script src="js/custom_3d.js" defer></script>
</body>

</html>
